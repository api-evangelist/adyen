description: >-
  Adyen is a global payment company that provides businesses with a single platform
  to accept payments from customers worldwide. Their technology enables companies
  to accept a wide range of payment methods, including credit cards, digital wallets,
  and local payment methods, in multiple currencies and countries. Adyen also offers
  services such as fraud prevention, data analytics, and optimization tools to help
  businesses streamline their payment processes and improve their overall performance.
