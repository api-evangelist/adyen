naftiko: 1.0.0-alpha2
info:
  label: Adyen Checkout API — Results
  description: 'Adyen Checkout API — Results. 1 operations. Lead operation: Adyen Verify a Payment Result. Self-contained
    Naftiko capability covering one Adyen business surface.'
  tags:
  - Adyen
  - Results
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    ADYEN_API_KEY: ADYEN_API_KEY
capability:
  consumes:
  - type: http
    namespace: checkout-results
    baseUri: https://checkout-test.adyen.com/v71
    description: Adyen Checkout API — Results business capability. Self-contained, no shared references.
    resources:
    - name: payments-result
      path: /payments/result
      operations:
      - name: postpaymentsresult
        method: POST
        description: Adyen Verify a Payment Result
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
    authentication:
      type: apikey
      key: X-API-Key
      value: '{{env.ADYEN_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: checkout-results-rest
    port: 8080
    description: REST adapter for Adyen Checkout API — Results. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/payments/result
      name: payments-result
      description: REST surface for payments-result.
      operations:
      - method: POST
        name: postpaymentsresult
        description: Adyen Verify a Payment Result
        call: checkout-results.postpaymentsresult
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: checkout-results-mcp
    port: 9090
    transport: http
    description: MCP adapter for Adyen Checkout API — Results. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: adyen-verify-payment-result
      description: Adyen Verify a Payment Result
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: checkout-results.postpaymentsresult
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
