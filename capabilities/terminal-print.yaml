naftiko: 1.0.0-alpha2
info:
  label: Adyen Terminal API — Print
  description: 'Adyen Terminal API — Print. 1 operations. Lead operation: Adyen Print Request. Self-contained Naftiko capability
    covering one Adyen business surface.'
  tags:
  - Adyen
  - Print
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    ADYEN_API_KEY: ADYEN_API_KEY
capability:
  consumes:
  - type: http
    namespace: terminal-print
    baseUri: https://terminal-api-test.adyen.com/sync
    description: Adyen Terminal API — Print business capability. Self-contained, no shared references.
    resources:
    - name: print
      path: /print
      operations:
      - name: post
        method: POST
        description: Adyen Print Request
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
    authentication:
      type: apikey
      key: X-API-Key
      value: '{{env.ADYEN_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: terminal-print-rest
    port: 8080
    description: REST adapter for Adyen Terminal API — Print. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/print
      name: print
      description: REST surface for print.
      operations:
      - method: POST
        name: post
        description: Adyen Print Request
        call: terminal-print.post
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: terminal-print-mcp
    port: 9090
    transport: http
    description: MCP adapter for Adyen Terminal API — Print. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: adyen-print-request
      description: Adyen Print Request
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: terminal-print.post
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
