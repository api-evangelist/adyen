naftiko: 1.0.0-alpha2
info:
  label: Adyen Account API — closeAccount
  description: 'Adyen Account API — closeAccount. 1 operations. Lead operation: Adyen Close an Account. Self-contained Naftiko
    capability covering one Adyen business surface.'
  tags:
  - Adyen
  - closeAccount
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    ADYEN_API_KEY: ADYEN_API_KEY
capability:
  consumes:
  - type: http
    namespace: accounts-closeaccount
    baseUri: https://cal-test.adyen.com/cal/services/Account/v6
    description: Adyen Account API — closeAccount business capability. Self-contained, no shared references.
    resources:
    - name: closeAccount
      path: /closeAccount
      operations:
      - name: postcloseaccount
        method: POST
        description: Adyen Close an Account
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
    authentication:
      type: apikey
      key: X-API-Key
      value: '{{env.ADYEN_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: accounts-closeaccount-rest
    port: 8080
    description: REST adapter for Adyen Account API — closeAccount. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/closeaccount
      name: closeaccount
      description: REST surface for closeAccount.
      operations:
      - method: POST
        name: postcloseaccount
        description: Adyen Close an Account
        call: accounts-closeaccount.postcloseaccount
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: accounts-closeaccount-mcp
    port: 9090
    transport: http
    description: MCP adapter for Adyen Account API — closeAccount. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: adyen-close-account
      description: Adyen Close an Account
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: accounts-closeaccount.postcloseaccount
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
