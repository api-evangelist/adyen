naftiko: 1.0.0-alpha2
info:
  label: Adyen Terminal API — Display
  description: 'Adyen Terminal API — Display. 1 operations. Lead operation: Adyen Display Request. Self-contained Naftiko
    capability covering one Adyen business surface.'
  tags:
  - Adyen
  - Display
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    ADYEN_API_KEY: ADYEN_API_KEY
capability:
  consumes:
  - type: http
    namespace: terminal-display
    baseUri: https://terminal-api-test.adyen.com/sync
    description: Adyen Terminal API — Display business capability. Self-contained, no shared references.
    resources:
    - name: display
      path: /display
      operations:
      - name: post
        method: POST
        description: Adyen Display Request
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
    authentication:
      type: apikey
      key: X-API-Key
      value: '{{env.ADYEN_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: terminal-display-rest
    port: 8080
    description: REST adapter for Adyen Terminal API — Display. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/display
      name: display
      description: REST surface for display.
      operations:
      - method: POST
        name: post
        description: Adyen Display Request
        call: terminal-display.post
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: terminal-display-mcp
    port: 9090
    transport: http
    description: MCP adapter for Adyen Terminal API — Display. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: adyen-display-request
      description: Adyen Display Request
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: terminal-display.post
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
