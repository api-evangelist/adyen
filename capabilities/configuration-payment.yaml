naftiko: 1.0.0-alpha2
info:
  label: Adyen Configuration API — Payment
  description: 'Adyen Configuration API — Payment. 1 operations. Lead operation: Adyen Get Payment Instruments Linked to a
    Balance Account. Self-contained Naftiko capability covering one Adyen business surface.'
  tags:
  - Adyen
  - Payment
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    ADYEN_API_KEY: ADYEN_API_KEY
capability:
  consumes:
  - type: http
    namespace: configuration-payment
    baseUri: https://balanceplatform-api-test.adyen.com/bcl/v2
    description: Adyen Configuration API — Payment business capability. Self-contained, no shared references.
    resources:
    - name: balanceAccounts-id-paymentInstruments
      path: /balanceAccounts/{id}/paymentInstruments
      operations:
      - name: getbalanceaccountsidpaymentinstruments
        method: GET
        description: Adyen Get Payment Instruments Linked to a Balance Account
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id
          in: path
          type: string
          description: The unique identifier of the balance account.
          required: true
        - name: offset
          in: query
          type: integer
          description: The number of items that you want to skip.
        - name: limit
          in: query
          type: integer
          description: The number of items returned per page, maximum 100 items. By default, the response returns 10 items
            per page.
        - name: status
          in: query
          type: string
          description: The status of the payment instruments that you want to get. By default, the response includes payment
            instruments with any status.
    authentication:
      type: apikey
      key: X-API-Key
      value: '{{env.ADYEN_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: configuration-payment-rest
    port: 8080
    description: REST adapter for Adyen Configuration API — Payment. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/balanceaccounts/{id}/paymentinstruments
      name: balanceaccounts-id-paymentinstruments
      description: REST surface for balanceAccounts-id-paymentInstruments.
      operations:
      - method: GET
        name: getbalanceaccountsidpaymentinstruments
        description: Adyen Get Payment Instruments Linked to a Balance Account
        call: configuration-payment.getbalanceaccountsidpaymentinstruments
        with:
          id: rest.id
          offset: rest.offset
          limit: rest.limit
          status: rest.status
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: configuration-payment-mcp
    port: 9090
    transport: http
    description: MCP adapter for Adyen Configuration API — Payment. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: adyen-get-payment-instruments-linked
      description: Adyen Get Payment Instruments Linked to a Balance Account
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: configuration-payment.getbalanceaccountsidpaymentinstruments
      with:
        id: tools.id
        offset: tools.offset
        limit: tools.limit
        status: tools.status
      outputParameters:
      - type: object
        mapping: $.
