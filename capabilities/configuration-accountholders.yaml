  - type: http
    namespace: configuration-accountholders
    baseUri: https://balanceplatform-api-test.adyen.com/bcl/v2
    description: Adyen Configuration API — accountHolders business capability. Self-contained, no shared references.
    resources:
    - name: accountHolders
      path: /accountHolders
      operations:
      - name: postaccountholders
        method: POST
        description: Adyen Create an Account Holder
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
    - name: accountHolders-id
      path: /accountHolders/{id}
      operations:
      - name: getaccountholdersid
        method: GET
        description: Adyen Get an Account Holder
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id
          in: path
          type: string
          description: The unique identifier of the account holder.
          required: true
      - name: patchaccountholdersid
        method: PATCH
        description: Adyen Update an Account Holder
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id
          in: path
          type: string
          description: The unique identifier of the account holder.
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
    - name: accountHolders-id-balanceAccounts
      path: /accountHolders/{id}/balanceAccounts
      operations:
      - name: getaccountholdersidbalanceaccounts
        method: GET
        description: Adyen Get All Balance Accounts of an Account Holder
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id
          in: path
          type: string
          description: The unique identifier of the account holder.
          required: true
        - name: offset
          in: query
          type: integer
          description: The number of items that you want to skip.
        - name: limit
          in: query
          type: integer
          description: The number of items returned per page, maximum 100 items. By default, the response returns 10 items
            per page.
    - name: accountHolders-id-taxForms
      path: /accountHolders/{id}/taxForms
      operations:
      - name: getaccountholdersidtaxforms
        method: GET
        description: Adyen Get a Tax Form
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id
          in: path
          type: string
          description: The unique identifier of the account holder.
          required: true
        - name: formType
          in: query
          type: string
          description: The type of tax form you want to retrieve. Accepted values are **US1099k** and **US1099nec**
          required: true
        - name: year
          in: query
          type: integer
          description: The tax year in YYYY format for the tax form you want to retrieve
          required: true
    authentication:
      type: apikey
      key: X-API-Key
      value: '{{env.ADYEN_API_KEY}}'
      placement: header
  exposes:
