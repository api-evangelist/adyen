naftiko: 1.0.0-alpha2
info:
  label: Adyen Payment API — Cancel
  description: 'Adyen Payment API — Cancel. 1 operations. Lead operation: Adyen Cancel an Authorisation. Self-contained Naftiko
    capability covering one Adyen business surface.'
  tags:
  - Adyen
  - Cancel
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    ADYEN_API_KEY: ADYEN_API_KEY
capability:
  consumes:
  - type: http
    namespace: payments-cancel
    baseUri: https://pal-test.adyen.com/pal/servlet/Payment/v68
    description: Adyen Payment API — Cancel business capability. Self-contained, no shared references.
    resources:
    - name: cancel
      path: /cancel
      operations:
      - name: postcancel
        method: POST
        description: Adyen Cancel an Authorisation
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
    authentication:
      type: apikey
      key: X-API-Key
      value: '{{env.ADYEN_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: payments-cancel-rest
    port: 8080
    description: REST adapter for Adyen Payment API — Cancel. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/cancel
      name: cancel
      description: REST surface for cancel.
      operations:
      - method: POST
        name: postcancel
        description: Adyen Cancel an Authorisation
        call: payments-cancel.postcancel
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: payments-cancel-mcp
    port: 9090
    transport: http
    description: MCP adapter for Adyen Payment API — Cancel. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: adyen-cancel-authorisation
      description: Adyen Cancel an Authorisation
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: payments-cancel.postcancel
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
