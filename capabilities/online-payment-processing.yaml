naftiko: 1.0.0-alpha2
info:
  label: Adyen Online Payment Processing
  description: 'Unified capability for accepting and managing online payments. Combines the Checkout API and Payments API
    to provide merchants and developers with a complete payment acceptance workflow including session creation, payment authorisation,
    refunds, and cancellations. Primary persona: Developer or Merchant Platform Engineer.'
  tags:
  - Adyen
  - Payments
  - Checkout
  - Online Payments
  - E-Commerce
  created: '2026-04-19'
  modified: '2026-05-06'
binds:
- namespace: env
  keys:
    ADYEN_API_KEY: ADYEN_API_KEY
capability:
  consumes:
  - type: http
    namespace: checkout
    baseUri: https://checkout-test.adyen.com/v71
    description: Adyen Checkout API for initiating and managing online payments.
    authentication:
      type: apikey
      key: X-API-Key
      value: '{{ADYEN_API_KEY}}'
      placement: header
    resources:
    - name: payments
      path: /payments
      description: Initiate and manage payment transactions.
      operations:
      - name: create-payment
        method: POST
        description: Submit a payment request for the selected payment method.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: payment-sessions
      path: /sessions
      description: Create and manage checkout sessions.
      operations:
      - name: create-session
        method: POST
        description: Create a payment session for checkout.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: payment-methods
      path: /paymentMethods
      description: Retrieve available payment methods for a shopper.
      operations:
      - name: list-payment-methods
        method: POST
        description: Get a list of available payment methods based on the transaction and shopper context.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: refunds
      path: /payments/{paymentPspReference}/refunds
      description: Refund payments.
      operations:
      - name: refund-payment
        method: POST
        description: Refund a payment using the PSP reference.
        inputParameters:
        - name: paymentPspReference
          in: path
          type: string
          required: true
          description: The PSP reference of the payment to refund.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: cancels
      path: /cancels
      description: Cancel authorised payments.
      operations:
      - name: cancel-payment
        method: POST
        description: Cancel an authorised payment.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  - type: http
    namespace: payments
    baseUri: https://pal-test.adyen.com/pal/servlet/Payment/v68
    description: Adyen classic Payment API.
    authentication:
      type: apikey
      key: X-API-Key
      value: '{{ADYEN_API_KEY}}'
      placement: header
    resources:
    - name: authorise
      path: /authorise
      description: Authorise a payment.
      operations:
      - name: authorise-payment
        method: POST
        description: Authorise a payment request.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: capture
      path: /capture
      description: Capture an authorised payment.
      operations:
      - name: capture-payment
        method: POST
        description: Capture a previously authorised payment.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: refund
      path: /refund
      description: Refund a payment.
      operations:
      - name: refund-payment
        method: POST
        description: Refund a captured payment.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: cancel
      path: /cancel
      description: Cancel an authorised payment.
      operations:
      - name: cancel-payment
        method: POST
        description: Cancel an authorised payment.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    port: 8080
    namespace: adyen-online-payments-api
    description: Unified REST API for Adyen online payment processing workflows.
    resources:
    - path: /v1/sessions
      name: checkout-sessions
      description: Create checkout sessions for hosted payment flows.
      operations:
      - method: POST
        name: create-checkout-session
        description: Create a checkout session.
        call: checkout.create-session
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/payment-methods
      name: payment-methods
      description: Get available payment methods for a shopper.
      operations:
      - method: POST
        name: list-payment-methods
        description: List available payment methods.
        call: checkout.list-payment-methods
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/payments
      name: payments
      description: Initiate and manage payments.
      operations:
      - method: POST
        name: create-payment
        description: Create a payment via Checkout API.
        call: checkout.create-payment
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/payments/authorise
      name: authorise
      description: Authorise a payment via classic Payments API.
      operations:
      - method: POST
        name: authorise-payment
        description: Authorise a payment.
        call: payments.authorise-payment
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/payments/capture
      name: capture
      description: Capture authorised payments.
      operations:
      - method: POST
        name: capture-payment
        description: Capture an authorised payment.
        call: payments.capture-payment
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/payments/{paymentPspReference}/refunds
      name: refunds
      description: Refund completed payments.
      operations:
      - method: POST
        name: refund-payment
        description: Refund a payment.
        call: checkout.refund-payment
        with:
          paymentPspReference: rest.paymentPspReference
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/payments/cancel
      name: cancels
      description: Cancel authorised payments.
      operations:
      - method: POST
        name: cancel-payment
        description: Cancel an authorised payment.
        call: checkout.cancel-payment
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    port: 9080
    namespace: adyen-online-payments-mcp
    transport: http
    description: MCP server for AI-assisted Adyen online payment processing.
    tools:
    - name: create-checkout-session
      description: Create an Adyen checkout session for hosted payment flows.
      hints:
        readOnly: false
        destructive: false
      call: checkout.create-session
      outputParameters:
      - type: object
        mapping: $.
    - name: list-payment-methods
      description: List available payment methods for a shopper based on their context.
      hints:
        readOnly: true
        destructive: false
      call: checkout.list-payment-methods
      outputParameters:
      - type: object
        mapping: $.
    - name: create-payment
      description: Initiate a payment via Adyen Checkout API.
      hints:
        readOnly: false
        destructive: false
      call: checkout.create-payment
      outputParameters:
      - type: object
        mapping: $.
    - name: authorise-payment
      description: Authorise a payment via classic Adyen Payments API.
      hints:
        readOnly: false
        destructive: false
      call: payments.authorise-payment
      outputParameters:
      - type: object
        mapping: $.
    - name: capture-payment
      description: Capture a previously authorised payment.
      hints:
        readOnly: false
        destructive: false
      call: payments.capture-payment
      outputParameters:
      - type: object
        mapping: $.
    - name: refund-payment
      description: Refund a completed payment using its PSP reference.
      hints:
        readOnly: false
        destructive: false
      call: checkout.refund-payment
      with:
        paymentPspReference: tools.paymentPspReference
      outputParameters:
      - type: object
        mapping: $.
    - name: cancel-payment
      description: Cancel an authorised payment before capture.
      hints:
        readOnly: false
        destructive: true
      call: checkout.cancel-payment
      outputParameters:
      - type: object
        mapping: $.
