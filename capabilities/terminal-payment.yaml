naftiko: 1.0.0-alpha2
info:
  label: Adyen Terminal API — Payment
  description: 'Adyen Terminal API — Payment. 1 operations. Lead operation: Adyen Payment Request. Self-contained Naftiko
    capability covering one Adyen business surface.'
  tags:
  - Adyen
  - Payment
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    ADYEN_API_KEY: ADYEN_API_KEY
capability:
  consumes:
  - type: http
    namespace: terminal-payment
    baseUri: https://terminal-api-test.adyen.com/sync
    description: Adyen Terminal API — Payment business capability. Self-contained, no shared references.
    resources:
    - name: payment
      path: /payment
      operations:
      - name: post
        method: POST
        description: Adyen Payment Request
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
    authentication:
      type: apikey
      key: X-API-Key
      value: '{{env.ADYEN_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: terminal-payment-rest
    port: 8080
    description: REST adapter for Adyen Terminal API — Payment. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/payment
      name: payment
      description: REST surface for payment.
      operations:
      - method: POST
        name: post
        description: Adyen Payment Request
        call: terminal-payment.post
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: terminal-payment-mcp
    port: 9090
    transport: http
    description: MCP adapter for Adyen Terminal API — Payment. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: adyen-payment-request
      description: Adyen Payment Request
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: terminal-payment.post
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
