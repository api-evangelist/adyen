naftiko: 1.0.0-alpha2
info:
  label: Adyen POS Terminal Management API — findTerminal
  description: 'Adyen POS Terminal Management API — findTerminal. 1 operations. Lead operation: Adyen Get the Account or Store
    of a Terminal. Self-contained Naftiko capability covering one Adyen business surface.'
  tags:
  - Adyen
  - findTerminal
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    ADYEN_API_KEY: ADYEN_API_KEY
capability:
  consumes:
  - type: http
    namespace: pos-terminal-findterminal
    baseUri: https://postfmapi-test.adyen.com/postfmapi/terminal/v1
    description: Adyen POS Terminal Management API — findTerminal business capability. Self-contained, no shared references.
    resources:
    - name: findTerminal
      path: /findTerminal
      operations:
      - name: postfindterminal
        method: POST
        description: Adyen Get the Account or Store of a Terminal
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
    authentication:
      type: apikey
      key: X-API-Key
      value: '{{env.ADYEN_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: pos-terminal-findterminal-rest
    port: 8080
    description: REST adapter for Adyen POS Terminal Management API — findTerminal. One Spectral-compliant resource per consumed
      operation, prefixed with /v1.
    resources:
    - path: /v1/findterminal
      name: findterminal
      description: REST surface for findTerminal.
      operations:
      - method: POST
        name: postfindterminal
        description: Adyen Get the Account or Store of a Terminal
        call: pos-terminal-findterminal.postfindterminal
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: pos-terminal-findterminal-mcp
    port: 9090
    transport: http
    description: MCP adapter for Adyen POS Terminal Management API — findTerminal. One tool per consumed operation, routed
      inline through this capability's consumes block.
    tools:
    - name: adyen-get-account-store-terminal
      description: Adyen Get the Account or Store of a Terminal
      hints:
        readOnly: true
        destructive: false
        idempotent: false
      call: pos-terminal-findterminal.postfindterminal
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
