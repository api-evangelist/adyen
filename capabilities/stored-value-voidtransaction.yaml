naftiko: 1.0.0-alpha2
info:
  label: Adyen Stored Value API — voidTransaction
  description: 'Adyen Stored Value API — voidTransaction. 1 operations. Lead operation: Adyen Voids a Transaction.. Self-contained
    Naftiko capability covering one Adyen business surface.'
  tags:
  - Adyen
  - voidTransaction
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    ADYEN_API_KEY: ADYEN_API_KEY
capability:
  consumes:
  - type: http
    namespace: stored-value-voidtransaction
    baseUri: https://pal-test.adyen.com/pal/servlet/StoredValue/v46
    description: Adyen Stored Value API — voidTransaction business capability. Self-contained, no shared references.
    resources:
    - name: voidTransaction
      path: /voidTransaction
      operations:
      - name: postvoidtransaction
        method: POST
        description: Adyen Voids a Transaction.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
    authentication:
      type: apikey
      key: X-API-Key
      value: '{{env.ADYEN_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: stored-value-voidtransaction-rest
    port: 8080
    description: REST adapter for Adyen Stored Value API — voidTransaction. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/voidtransaction
      name: voidtransaction
      description: REST surface for voidTransaction.
      operations:
      - method: POST
        name: postvoidtransaction
        description: Adyen Voids a Transaction.
        call: stored-value-voidtransaction.postvoidtransaction
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: stored-value-voidtransaction-mcp
    port: 9090
    transport: http
    description: MCP adapter for Adyen Stored Value API — voidTransaction. One tool per consumed operation, routed inline
      through this capability's consumes block.
    tools:
    - name: adyen-voids-transaction
      description: Adyen Voids a Transaction.
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: stored-value-voidtransaction.postvoidtransaction
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
