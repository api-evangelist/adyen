  - type: mcp
    namespace: management-merchants-mcp
    port: 9090
    transport: http
    description: MCP adapter for Adyen Management API — Merchants. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: adyen-get-list-merchant-accounts
      description: Adyen Get a List of Merchant Accounts
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: management-merchants.getmerchants
      with:
        pageNumber: tools.pageNumber
        pageSize: tools.pageSize
      outputParameters:
      - type: object
        mapping: $.
    - name: adyen-create-merchant-account
      description: Adyen Create a Merchant Account
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: management-merchants.postmerchants
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: adyen-get-merchant-account
      description: Adyen Get a Merchant Account
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: management-merchants.getmerchantsmerchantid
      with:
        merchantId: tools.merchantId
      outputParameters:
      - type: object
        mapping: $.
    - name: adyen-request-activate-merchant-account
      description: Adyen Request to Activate a Merchant Account
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: management-merchants.postmerchantsmerchantidactivate
      with:
        merchantId: tools.merchantId
      outputParameters:
