naftiko: 1.0.0-alpha2
info:
  label: Adyen Account API — Suspend
  description: 'Adyen Account API — Suspend. 2 operations. Lead operation: Adyen Suspend an Account Holder. Self-contained
    Naftiko capability covering one Adyen business surface.'
  tags:
  - Adyen
  - Suspend
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    ADYEN_API_KEY: ADYEN_API_KEY
capability:
  consumes:
  - type: http
    namespace: account-suspend
    baseUri: https://cal-test.adyen.com/cal/services/Account/v6
    description: Adyen Account API — Suspend business capability. Self-contained, no shared references.
    resources:
    - name: suspendAccountHolder
      path: /suspendAccountHolder
      operations:
      - name: postsuspendaccountholder
        method: POST
        description: Adyen Suspend an Account Holder
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
    - name: unSuspendAccountHolder
      path: /unSuspendAccountHolder
      operations:
      - name: postunsuspendaccountholder
        method: POST
        description: Adyen Unsuspend an Account Holder
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
    authentication:
      type: apikey
      key: X-API-Key
      value: '{{env.ADYEN_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: account-suspend-rest
    port: 8080
    description: REST adapter for Adyen Account API — Suspend. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/suspendaccountholder
      name: suspendaccountholder
      description: REST surface for suspendAccountHolder.
      operations:
      - method: POST
        name: postsuspendaccountholder
        description: Adyen Suspend an Account Holder
        call: account-suspend.postsuspendaccountholder
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/unsuspendaccountholder
      name: unsuspendaccountholder
      description: REST surface for unSuspendAccountHolder.
      operations:
      - method: POST
        name: postunsuspendaccountholder
        description: Adyen Unsuspend an Account Holder
        call: account-suspend.postunsuspendaccountholder
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: account-suspend-mcp
    port: 9090
    transport: http
    description: MCP adapter for Adyen Account API — Suspend. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: adyen-suspend-account-holder
      description: Adyen Suspend an Account Holder
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: account-suspend.postsuspendaccountholder
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: adyen-unsuspend-account-holder
      description: Adyen Unsuspend an Account Holder
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: account-suspend.postunsuspendaccountholder
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
