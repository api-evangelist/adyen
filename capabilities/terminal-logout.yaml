naftiko: 1.0.0-alpha2
info:
  label: Adyen Terminal API — Logout
  description: 'Adyen Terminal API — Logout. 1 operations. Lead operation: Adyen Logout Request. Self-contained Naftiko capability
    covering one Adyen business surface.'
  tags:
  - Adyen
  - Logout
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    ADYEN_API_KEY: ADYEN_API_KEY
capability:
  consumes:
  - type: http
    namespace: terminal-logout
    baseUri: https://terminal-api-test.adyen.com/sync
    description: Adyen Terminal API — Logout business capability. Self-contained, no shared references.
    resources:
    - name: logout
      path: /logout
      operations:
      - name: post
        method: POST
        description: Adyen Logout Request
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
    authentication:
      type: apikey
      key: X-API-Key
      value: '{{env.ADYEN_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: terminal-logout-rest
    port: 8080
    description: REST adapter for Adyen Terminal API — Logout. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/logout
      name: logout
      description: REST surface for logout.
      operations:
      - method: POST
        name: post
        description: Adyen Logout Request
        call: terminal-logout.post
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: terminal-logout-mcp
    port: 9090
    transport: http
    description: MCP adapter for Adyen Terminal API — Logout. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: adyen-logout-request
      description: Adyen Logout Request
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: terminal-logout.post
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
