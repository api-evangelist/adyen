naftiko: 1.0.0-alpha2
info:
  label: Adyen Checkout API — Sessions
  description: 'Adyen Checkout API — Sessions. 3 operations. Lead operation: Adyen Get an Apple Pay Session. Self-contained
    Naftiko capability covering one Adyen business surface.'
  tags:
  - Adyen
  - Sessions
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    ADYEN_API_KEY: ADYEN_API_KEY
capability:
  consumes:
  - type: http
    namespace: checkout-sessions
    baseUri: https://checkout-test.adyen.com/v71
    description: Adyen Checkout API — Sessions business capability. Self-contained, no shared references.
    resources:
    - name: applePay-sessions
      path: /applePay/sessions
      operations:
      - name: postapplepaysessions
        method: POST
        description: Adyen Get an Apple Pay Session
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
    - name: sessions
      path: /sessions
      operations:
      - name: postsessions
        method: POST
        description: Adyen Create a Payment Session
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
    - name: sessions-sessionId
      path: /sessions/{sessionId}
      operations:
      - name: getsessionssessionid
        method: GET
        description: Adyen Get the Result of a Payment Session
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: sessionId
          in: path
          type: string
          description: A unique identifier of the session.
          required: true
        - name: sessionResult
          in: query
          type: string
          description: The `sessionResult` value from the Drop-in or Component.
          required: true
    authentication:
      type: apikey
      key: X-API-Key
      value: '{{env.ADYEN_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: checkout-sessions-rest
    port: 8080
    description: REST adapter for Adyen Checkout API — Sessions. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/applepay/sessions
      name: applepay-sessions
      description: REST surface for applePay-sessions.
      operations:
      - method: POST
        name: postapplepaysessions
        description: Adyen Get an Apple Pay Session
        call: checkout-sessions.postapplepaysessions
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/sessions
      name: sessions
      description: REST surface for sessions.
      operations:
      - method: POST
        name: postsessions
        description: Adyen Create a Payment Session
        call: checkout-sessions.postsessions
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/sessions/{sessionid}
      name: sessions-sessionid
      description: REST surface for sessions-sessionId.
      operations:
      - method: GET
        name: getsessionssessionid
        description: Adyen Get the Result of a Payment Session
        call: checkout-sessions.getsessionssessionid
        with:
          sessionId: rest.sessionId
          sessionResult: rest.sessionResult
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: checkout-sessions-mcp
    port: 9090
    transport: http
    description: MCP adapter for Adyen Checkout API — Sessions. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: adyen-get-apple-pay-session
      description: Adyen Get an Apple Pay Session
      hints:
        readOnly: true
        destructive: false
        idempotent: false
      call: checkout-sessions.postapplepaysessions
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: adyen-create-payment-session
      description: Adyen Create a Payment Session
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: checkout-sessions.postsessions
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: adyen-get-result-payment-session
      description: Adyen Get the Result of a Payment Session
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: checkout-sessions.getsessionssessionid
      with:
        sessionId: tools.sessionId
        sessionResult: tools.sessionResult
      outputParameters:
      - type: object
        mapping: $.
