naftiko: 1.0.0-alpha2
info:
  label: Adyen Account API — Stores
  description: 'Adyen Account API — Stores. 1 operations. Lead operation: Adyen Close Stores. Self-contained Naftiko capability
    covering one Adyen business surface.'
  tags:
  - Adyen
  - Stores
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    ADYEN_API_KEY: ADYEN_API_KEY
capability:
  consumes:
  - type: http
    namespace: account-stores
    baseUri: https://cal-test.adyen.com/cal/services/Account/v6
    description: Adyen Account API — Stores business capability. Self-contained, no shared references.
    resources:
    - name: closeStores
      path: /closeStores
      operations:
      - name: postclosestores
        method: POST
        description: Adyen Close Stores
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
    authentication:
      type: apikey
      key: X-API-Key
      value: '{{env.ADYEN_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: account-stores-rest
    port: 8080
    description: REST adapter for Adyen Account API — Stores. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/closestores
      name: closestores
      description: REST surface for closeStores.
      operations:
      - method: POST
        name: postclosestores
        description: Adyen Close Stores
        call: account-stores.postclosestores
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: account-stores-mcp
    port: 9090
    transport: http
    description: MCP adapter for Adyen Account API — Stores. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: adyen-close-stores
      description: Adyen Close Stores
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: account-stores.postclosestores
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
