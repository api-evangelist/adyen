naftiko: 1.0.0-alpha2
info:
  label: Adyen Payout API — confirmThirdParty
  description: 'Adyen Payout API — confirmThirdParty. 1 operations. Lead operation: Adyen Confirm a Payout. Self-contained
    Naftiko capability covering one Adyen business surface.'
  tags:
  - Adyen
  - confirmThirdParty
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    ADYEN_API_KEY: ADYEN_API_KEY
capability:
  consumes:
  - type: http
    namespace: payouts-confirmthirdparty
    baseUri: https://pal-test.adyen.com/pal/servlet/Payout/v68
    description: Adyen Payout API — confirmThirdParty business capability. Self-contained, no shared references.
    resources:
    - name: confirmThirdParty
      path: /confirmThirdParty
      operations:
      - name: postconfirmthirdparty
        method: POST
        description: Adyen Confirm a Payout
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
    authentication:
      type: apikey
      key: X-API-Key
      value: '{{env.ADYEN_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: payouts-confirmthirdparty-rest
    port: 8080
    description: REST adapter for Adyen Payout API — confirmThirdParty. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/confirmthirdparty
      name: confirmthirdparty
      description: REST surface for confirmThirdParty.
      operations:
      - method: POST
        name: postconfirmthirdparty
        description: Adyen Confirm a Payout
        call: payouts-confirmthirdparty.postconfirmthirdparty
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: payouts-confirmthirdparty-mcp
    port: 9090
    transport: http
    description: MCP adapter for Adyen Payout API — confirmThirdParty. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: adyen-confirm-payout
      description: Adyen Confirm a Payout
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: payouts-confirmthirdparty.postconfirmthirdparty
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
