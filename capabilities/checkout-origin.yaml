naftiko: 1.0.0-alpha2
info:
  label: Adyen Checkout API — Origin
  description: 'Adyen Checkout API — Origin. 1 operations. Lead operation: Adyen Create OriginKey Values for Domains. Self-contained
    Naftiko capability covering one Adyen business surface.'
  tags:
  - Adyen
  - Origin
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    ADYEN_API_KEY: ADYEN_API_KEY
capability:
  consumes:
  - type: http
    namespace: checkout-origin
    baseUri: https://checkout-test.adyen.com/v71
    description: Adyen Checkout API — Origin business capability. Self-contained, no shared references.
    resources:
    - name: originKeys
      path: /originKeys
      operations:
      - name: postoriginkeys
        method: POST
        description: Adyen Create OriginKey Values for Domains
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
    authentication:
      type: apikey
      key: X-API-Key
      value: '{{env.ADYEN_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: checkout-origin-rest
    port: 8080
    description: REST adapter for Adyen Checkout API — Origin. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/originkeys
      name: originkeys
      description: REST surface for originKeys.
      operations:
      - method: POST
        name: postoriginkeys
        description: Adyen Create OriginKey Values for Domains
        call: checkout-origin.postoriginkeys
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: checkout-origin-mcp
    port: 9090
    transport: http
    description: MCP adapter for Adyen Checkout API — Origin. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: adyen-create-originkey-values-domains
      description: Adyen Create OriginKey Values for Domains
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: checkout-origin.postoriginkeys
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
