    port: 9090
    transport: http
    description: MCP adapter for Adyen Checkout API — paymentSession. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: adyen-create-payment-session
      description: Adyen Create a Payment Session
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: checkout-paymentsession.postpaymentsession
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
