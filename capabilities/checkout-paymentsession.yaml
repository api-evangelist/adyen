  - type: http
    namespace: checkout-paymentsession
    baseUri: https://checkout-test.adyen.com/v71
    description: Adyen Checkout API — paymentSession business capability. Self-contained, no shared references.
    resources:
    - name: paymentSession
      path: /paymentSession
      operations:
      - name: postpaymentsession
        method: POST
        description: Adyen Create a Payment Session
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
    authentication:
      type: apikey
      key: X-API-Key
      value: '{{env.ADYEN_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: checkout-paymentsession-rest
    port: 8080
    description: REST adapter for Adyen Checkout API — paymentSession. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/paymentsession
      name: paymentsession
      description: REST surface for paymentSession.
      operations:
      - method: POST
        name: postpaymentsession
        description: Adyen Create a Payment Session
        call: checkout-paymentsession.postpaymentsession
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
