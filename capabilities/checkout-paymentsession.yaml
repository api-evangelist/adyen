  description: 'Adyen Checkout API — paymentSession. 1 operations. Lead operation: Adyen Create a Payment Session. Self-contained
    Naftiko capability covering one Adyen business surface.'
  tags:
  - Adyen
  - paymentSession
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    ADYEN_API_KEY: ADYEN_API_KEY
capability:
