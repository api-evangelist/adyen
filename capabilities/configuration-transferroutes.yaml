naftiko: 1.0.0-alpha2
info:
  label: Adyen Configuration API — transferRoutes
  description: 'Adyen Configuration API — transferRoutes. 1 operations. Lead operation: Adyen Calculate Transfer Routes. Self-contained
    Naftiko capability covering one Adyen business surface.'
  tags:
  - Adyen
  - transferRoutes
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    ADYEN_API_KEY: ADYEN_API_KEY
capability:
  consumes:
  - type: http
    namespace: configuration-transferroutes
    baseUri: https://balanceplatform-api-test.adyen.com/bcl/v2
    description: Adyen Configuration API — transferRoutes business capability. Self-contained, no shared references.
    resources:
    - name: transferRoutes-calculate
      path: /transferRoutes/calculate
      operations:
      - name: posttransferroutescalculate
        method: POST
        description: Adyen Calculate Transfer Routes
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
    authentication:
      type: apikey
      key: X-API-Key
      value: '{{env.ADYEN_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: configuration-transferroutes-rest
    port: 8080
    description: REST adapter for Adyen Configuration API — transferRoutes. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/transferroutes/calculate
      name: transferroutes-calculate
      description: REST surface for transferRoutes-calculate.
      operations:
      - method: POST
        name: posttransferroutescalculate
        description: Adyen Calculate Transfer Routes
        call: configuration-transferroutes.posttransferroutescalculate
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: configuration-transferroutes-mcp
    port: 9090
    transport: http
    description: MCP adapter for Adyen Configuration API — transferRoutes. One tool per consumed operation, routed inline
      through this capability's consumes block.
    tools:
    - name: adyen-calculate-transfer-routes
      description: Adyen Calculate Transfer Routes
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: configuration-transferroutes.posttransferroutescalculate
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
