naftiko: 1.0.0-alpha2
info:
  label: Adyen Checkout API — paymentMethods
  description: 'Adyen Checkout API — paymentMethods. 2 operations. Lead operation: Adyen Get a List of Available Payment Methods.
    Self-contained Naftiko capability covering one Adyen business surface.'
  tags:
  - Adyen
  - paymentMethods
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    ADYEN_API_KEY: ADYEN_API_KEY
capability:
  consumes:
  - type: http
    namespace: checkout-paymentmethods
    baseUri: https://checkout-test.adyen.com/v71
    description: Adyen Checkout API — paymentMethods business capability. Self-contained, no shared references.
    resources:
    - name: paymentMethods
      path: /paymentMethods
      operations:
      - name: postpaymentmethods
        method: POST
        description: Adyen Get a List of Available Payment Methods
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
    - name: paymentMethods-balance
      path: /paymentMethods/balance
      operations:
      - name: postpaymentmethodsbalance
        method: POST
        description: Adyen Get the Balance of a Gift Card
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
    authentication:
      type: apikey
      key: X-API-Key
      value: '{{env.ADYEN_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: checkout-paymentmethods-rest
    port: 8080
    description: REST adapter for Adyen Checkout API — paymentMethods. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/paymentmethods
      name: paymentmethods
      description: REST surface for paymentMethods.
      operations:
      - method: POST
        name: postpaymentmethods
        description: Adyen Get a List of Available Payment Methods
        call: checkout-paymentmethods.postpaymentmethods
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/paymentmethods/balance
      name: paymentmethods-balance
      description: REST surface for paymentMethods-balance.
      operations:
      - method: POST
        name: postpaymentmethodsbalance
        description: Adyen Get the Balance of a Gift Card
        call: checkout-paymentmethods.postpaymentmethodsbalance
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: checkout-paymentmethods-mcp
    port: 9090
    transport: http
    description: MCP adapter for Adyen Checkout API — paymentMethods. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: adyen-get-list-available-payment
      description: Adyen Get a List of Available Payment Methods
      hints:
        readOnly: true
        destructive: false
        idempotent: false
      call: checkout-paymentmethods.postpaymentmethods
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: adyen-get-balance-gift-card
      description: Adyen Get the Balance of a Gift Card
      hints:
        readOnly: true
        destructive: false
        idempotent: false
      call: checkout-paymentmethods.postpaymentmethodsbalance
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
