naftiko: 1.0.0-alpha2
info:
  label: Adyen Payment API — Donate
  description: 'Adyen Payment API — Donate. 1 operations. Lead operation: Adyen Create a Donation. Self-contained Naftiko
    capability covering one Adyen business surface.'
  tags:
  - Adyen
  - Donate
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    ADYEN_API_KEY: ADYEN_API_KEY
capability:
  consumes:
  - type: http
    namespace: payments-donate
    baseUri: https://pal-test.adyen.com/pal/servlet/Payment/v68
    description: Adyen Payment API — Donate business capability. Self-contained, no shared references.
    resources:
    - name: donate
      path: /donate
      operations:
      - name: postdonate
        method: POST
        description: Adyen Create a Donation
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
    authentication:
      type: apikey
      key: X-API-Key
      value: '{{env.ADYEN_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: payments-donate-rest
    port: 8080
    description: REST adapter for Adyen Payment API — Donate. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/donate
      name: donate
      description: REST surface for donate.
      operations:
      - method: POST
        name: postdonate
        description: Adyen Create a Donation
        call: payments-donate.postdonate
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: payments-donate-mcp
    port: 9090
    transport: http
    description: MCP adapter for Adyen Payment API — Donate. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: adyen-create-donation
      description: Adyen Create a Donation
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: payments-donate.postdonate
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
