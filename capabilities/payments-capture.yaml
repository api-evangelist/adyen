naftiko: 1.0.0-alpha2
info:
  label: Adyen Payment API — Capture
  description: 'Adyen Payment API — Capture. 1 operations. Lead operation: Adyen Capture an Authorisation. Self-contained
    Naftiko capability covering one Adyen business surface.'
  tags:
  - Adyen
  - Capture
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    ADYEN_API_KEY: ADYEN_API_KEY
capability:
  consumes:
  - type: http
    namespace: payments-capture
    baseUri: https://pal-test.adyen.com/pal/servlet/Payment/v68
    description: Adyen Payment API — Capture business capability. Self-contained, no shared references.
    resources:
    - name: capture
      path: /capture
      operations:
      - name: postcapture
        method: POST
        description: Adyen Capture an Authorisation
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
    authentication:
      type: apikey
      key: X-API-Key
      value: '{{env.ADYEN_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: payments-capture-rest
    port: 8080
    description: REST adapter for Adyen Payment API — Capture. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/capture
      name: capture
      description: REST surface for capture.
      operations:
      - method: POST
        name: postcapture
        description: Adyen Capture an Authorisation
        call: payments-capture.postcapture
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: payments-capture-mcp
    port: 9090
    transport: http
    description: MCP adapter for Adyen Payment API — Capture. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: adyen-capture-authorisation
      description: Adyen Capture an Authorisation
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: payments-capture.postcapture
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
