naftiko: 1.0.0-alpha2
info:
  label: Adyen Account API — Shareholders
  description: 'Adyen Account API — Shareholders. 1 operations. Lead operation: Adyen Delete Shareholders. Self-contained
    Naftiko capability covering one Adyen business surface.'
  tags:
  - Adyen
  - Shareholders
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    ADYEN_API_KEY: ADYEN_API_KEY
capability:
  consumes:
  - type: http
    namespace: account-shareholders
    baseUri: https://cal-test.adyen.com/cal/services/Account/v6
    description: Adyen Account API — Shareholders business capability. Self-contained, no shared references.
    resources:
    - name: deleteShareholders
      path: /deleteShareholders
      operations:
      - name: postdeleteshareholders
        method: POST
        description: Adyen Delete Shareholders
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
    authentication:
      type: apikey
      key: X-API-Key
      value: '{{env.ADYEN_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: account-shareholders-rest
    port: 8080
    description: REST adapter for Adyen Account API — Shareholders. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/deleteshareholders
      name: deleteshareholders
      description: REST surface for deleteShareholders.
      operations:
      - method: POST
        name: postdeleteshareholders
        description: Adyen Delete Shareholders
        call: account-shareholders.postdeleteshareholders
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: account-shareholders-mcp
    port: 9090
    transport: http
    description: MCP adapter for Adyen Account API — Shareholders. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: adyen-delete-shareholders
      description: Adyen Delete Shareholders
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: account-shareholders.postdeleteshareholders
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
