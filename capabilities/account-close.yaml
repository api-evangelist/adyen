naftiko: 1.0.0-alpha2
info:
  label: Adyen Account API — Close
  description: 'Adyen Account API — Close. 3 operations. Lead operation: Adyen Close an Account. Self-contained Naftiko capability
    covering one Adyen business surface.'
  tags:
  - Adyen
  - Close
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    ADYEN_API_KEY: ADYEN_API_KEY
capability:
  consumes:
  - type: http
    namespace: account-close
    baseUri: https://cal-test.adyen.com/cal/services/Account/v6
    description: Adyen Account API — Close business capability. Self-contained, no shared references.
    resources:
    - name: closeAccount
      path: /closeAccount
      operations:
      - name: postcloseaccount
        method: POST
        description: Adyen Close an Account
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
    - name: closeAccountHolder
      path: /closeAccountHolder
      operations:
      - name: postcloseaccountholder
        method: POST
        description: Adyen Close an Account Holder
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
    - name: closeStores
      path: /closeStores
      operations:
      - name: postclosestores
        method: POST
        description: Adyen Close Stores
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
    authentication:
      type: apikey
      key: X-API-Key
      value: '{{env.ADYEN_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: account-close-rest
    port: 8080
    description: REST adapter for Adyen Account API — Close. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/closeaccount
      name: closeaccount
      description: REST surface for closeAccount.
      operations:
      - method: POST
        name: postcloseaccount
        description: Adyen Close an Account
        call: account-close.postcloseaccount
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/closeaccountholder
      name: closeaccountholder
      description: REST surface for closeAccountHolder.
      operations:
      - method: POST
        name: postcloseaccountholder
        description: Adyen Close an Account Holder
        call: account-close.postcloseaccountholder
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/closestores
      name: closestores
      description: REST surface for closeStores.
      operations:
      - method: POST
        name: postclosestores
        description: Adyen Close Stores
        call: account-close.postclosestores
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: account-close-mcp
    port: 9090
    transport: http
    description: MCP adapter for Adyen Account API — Close. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: adyen-close-account
      description: Adyen Close an Account
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: account-close.postcloseaccount
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: adyen-close-account-holder
      description: Adyen Close an Account Holder
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: account-close.postcloseaccountholder
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: adyen-close-stores
      description: Adyen Close Stores
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: account-close.postclosestores
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
