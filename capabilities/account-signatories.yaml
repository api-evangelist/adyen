naftiko: 1.0.0-alpha2
info:
  label: Adyen Account API — Signatories
  description: 'Adyen Account API — Signatories. 1 operations. Lead operation: Adyen Delete Signatories. Self-contained Naftiko
    capability covering one Adyen business surface.'
  tags:
  - Adyen
  - Signatories
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    ADYEN_API_KEY: ADYEN_API_KEY
capability:
  consumes:
  - type: http
    namespace: account-signatories
    baseUri: https://cal-test.adyen.com/cal/services/Account/v6
    description: Adyen Account API — Signatories business capability. Self-contained, no shared references.
    resources:
    - name: deleteSignatories
      path: /deleteSignatories
      operations:
      - name: postdeletesignatories
        method: POST
        description: Adyen Delete Signatories
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
    authentication:
      type: apikey
      key: X-API-Key
      value: '{{env.ADYEN_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: account-signatories-rest
    port: 8080
    description: REST adapter for Adyen Account API — Signatories. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/deletesignatories
      name: deletesignatories
      description: REST surface for deleteSignatories.
      operations:
      - method: POST
        name: postdeletesignatories
        description: Adyen Delete Signatories
        call: account-signatories.postdeletesignatories
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: account-signatories-mcp
    port: 9090
    transport: http
    description: MCP adapter for Adyen Account API — Signatories. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: adyen-delete-signatories
      description: Adyen Delete Signatories
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: account-signatories.postdeletesignatories
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
