naftiko: 1.0.0-alpha2
info:
  label: Adyen Configuration API — Pins
  description: 'Adyen Configuration API — Pins. 3 operations. Lead operation: Adyen Change Pin. Self-contained Naftiko capability
    covering one Adyen business surface.'
  tags:
  - Adyen
  - Pins
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    ADYEN_API_KEY: ADYEN_API_KEY
capability:
  consumes:
  - type: http
    namespace: configuration-pins
    baseUri: https://balanceplatform-api-test.adyen.com/bcl/v2
    description: Adyen Configuration API — Pins business capability. Self-contained, no shared references.
    resources:
    - name: pins-change
      path: /pins/change
      operations:
      - name: postpinschange
        method: POST
        description: Adyen Change Pin
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
    - name: pins-publicKey
      path: /pins/publicKey
      operations:
      - name: getpinspublickey
        method: GET
        description: Adyen Get RSA PublicKey
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: purpose
          in: query
          type: string
          description: Purpose of publicKey.
        - name: format
          in: query
          type: string
          description: Format of publicKey.
    - name: pins-reveal
      path: /pins/reveal
      operations:
      - name: postpinsreveal
        method: POST
        description: Adyen Reveal Pin
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
    authentication:
      type: apikey
      key: X-API-Key
      value: '{{env.ADYEN_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: configuration-pins-rest
    port: 8080
    description: REST adapter for Adyen Configuration API — Pins. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/pins/change
      name: pins-change
      description: REST surface for pins-change.
      operations:
      - method: POST
        name: postpinschange
        description: Adyen Change Pin
        call: configuration-pins.postpinschange
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/pins/publickey
      name: pins-publickey
      description: REST surface for pins-publicKey.
      operations:
      - method: GET
        name: getpinspublickey
        description: Adyen Get RSA PublicKey
        call: configuration-pins.getpinspublickey
        with:
          purpose: rest.purpose
          format: rest.format
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/pins/reveal
      name: pins-reveal
      description: REST surface for pins-reveal.
      operations:
      - method: POST
        name: postpinsreveal
        description: Adyen Reveal Pin
        call: configuration-pins.postpinsreveal
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: configuration-pins-mcp
    port: 9090
    transport: http
    description: MCP adapter for Adyen Configuration API — Pins. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: adyen-change-pin
      description: Adyen Change Pin
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: configuration-pins.postpinschange
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: adyen-get-rsa-publickey
      description: Adyen Get RSA PublicKey
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: configuration-pins.getpinspublickey
      with:
        purpose: tools.purpose
        format: tools.format
      outputParameters:
      - type: object
        mapping: $.
    - name: adyen-reveal-pin
      description: Adyen Reveal Pin
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: configuration-pins.postpinsreveal
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
