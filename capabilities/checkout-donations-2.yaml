naftiko: 1.0.0-alpha2
info:
  label: Adyen Checkout API — Donations
  description: 'Adyen Checkout API — Donations. 1 operations. Lead operation: Adyen Start a Transaction for Donations. Self-contained
    Naftiko capability covering one Adyen business surface.'
  tags:
  - Adyen
  - Donations
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    ADYEN_API_KEY: ADYEN_API_KEY
capability:
  consumes:
  - type: http
    namespace: checkout-donations-2
    baseUri: https://checkout-test.adyen.com/v71
    description: Adyen Checkout API — Donations business capability. Self-contained, no shared references.
    resources:
    - name: donations
      path: /donations
      operations:
      - name: postdonations
        method: POST
        description: Adyen Start a Transaction for Donations
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
    authentication:
      type: apikey
      key: X-API-Key
      value: '{{env.ADYEN_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: checkout-donations-2-rest
    port: 8080
    description: REST adapter for Adyen Checkout API — Donations. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/donations
      name: donations
      description: REST surface for donations.
      operations:
      - method: POST
        name: postdonations
        description: Adyen Start a Transaction for Donations
        call: checkout-donations-2.postdonations
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: checkout-donations-2-mcp
    port: 9090
    transport: http
    description: MCP adapter for Adyen Checkout API — Donations. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: adyen-start-transaction-donations
      description: Adyen Start a Transaction for Donations
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: checkout-donations-2.postdonations
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
