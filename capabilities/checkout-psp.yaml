naftiko: 1.0.0-alpha2
info:
  label: Adyen Checkout API — Psp
  description: 'Adyen Checkout API — Psp. 5 operations. Lead operation: Adyen Update an Authorised Amount. Self-contained
    Naftiko capability covering one Adyen business surface.'
  tags:
  - Adyen
  - Psp
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    ADYEN_API_KEY: ADYEN_API_KEY
capability:
  consumes:
  - type: http
    namespace: checkout-psp
    baseUri: https://checkout-test.adyen.com/v71
    description: Adyen Checkout API — Psp business capability. Self-contained, no shared references.
    resources:
    - name: payments-paymentPspReference-amountUpdates
      path: /payments/{paymentPspReference}/amountUpdates
      operations:
      - name: postpaymentspaymentpspreferenceamountupdates
        method: POST
        description: Adyen Update an Authorised Amount
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: paymentPspReference
          in: path
          type: string
          description: The [`pspReference`](https://docs.adyen.com/api-explorer/#/CheckoutService/latest/post/payments__resParam_pspReference)
            of the payment.
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
    - name: payments-paymentPspReference-cancels
      path: /payments/{paymentPspReference}/cancels
      operations:
      - name: postpaymentspaymentpspreferencecancels
        method: POST
        description: Adyen Cancel an Authorised Payment
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: paymentPspReference
          in: path
          type: string
          description: The [`pspReference`](https://docs.adyen.com/api-explorer/#/CheckoutService/latest/post/payments__resParam_pspReference)
            of the payment that you want to cancel.
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
    - name: payments-paymentPspReference-captures
      path: /payments/{paymentPspReference}/captures
      operations:
      - name: postpaymentspaymentpspreferencecaptures
        method: POST
        description: Adyen Capture an Authorised Payment
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: paymentPspReference
          in: path
          type: string
          description: The [`pspReference`](https://docs.adyen.com/api-explorer/#/CheckoutService/latest/post/payments__resParam_pspReference)
            of the payment that you want to capture.
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
    - name: payments-paymentPspReference-refunds
      path: /payments/{paymentPspReference}/refunds
      operations:
      - name: postpaymentspaymentpspreferencerefunds
        method: POST
        description: Adyen Refund a Captured Payment
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: paymentPspReference
          in: path
          type: string
          description: The [`pspReference`](https://docs.adyen.com/api-explorer/#/CheckoutService/latest/post/payments__resParam_pspReference)
            of the payment that you want to refund.
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
    - name: payments-paymentPspReference-reversals
      path: /payments/{paymentPspReference}/reversals
      operations:
      - name: postpaymentspaymentpspreferencereversals
        method: POST
        description: Adyen Refund or Cancel a Payment
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: paymentPspReference
          in: path
          type: string
          description: The [`pspReference`](https://docs.adyen.com/api-explorer/#/CheckoutService/latest/post/payments__resParam_pspReference)
            of the payment that you want to reverse.
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
    authentication:
      type: apikey
      key: X-API-Key
      value: '{{env.ADYEN_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: checkout-psp-rest
    port: 8080
    description: REST adapter for Adyen Checkout API — Psp. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/payments/{paymentpspreference}/amountupdates
      name: payments-paymentpspreference-amountupdates
      description: REST surface for payments-paymentPspReference-amountUpdates.
      operations:
      - method: POST
        name: postpaymentspaymentpspreferenceamountupdates
        description: Adyen Update an Authorised Amount
        call: checkout-psp.postpaymentspaymentpspreferenceamountupdates
        with:
          paymentPspReference: rest.paymentPspReference
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/payments/{paymentpspreference}/cancels
      name: payments-paymentpspreference-cancels
      description: REST surface for payments-paymentPspReference-cancels.
      operations:
      - method: POST
        name: postpaymentspaymentpspreferencecancels
        description: Adyen Cancel an Authorised Payment
        call: checkout-psp.postpaymentspaymentpspreferencecancels
        with:
          paymentPspReference: rest.paymentPspReference
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/payments/{paymentpspreference}/captures
      name: payments-paymentpspreference-captures
      description: REST surface for payments-paymentPspReference-captures.
      operations:
      - method: POST
        name: postpaymentspaymentpspreferencecaptures
        description: Adyen Capture an Authorised Payment
        call: checkout-psp.postpaymentspaymentpspreferencecaptures
        with:
          paymentPspReference: rest.paymentPspReference
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/payments/{paymentpspreference}/refunds
      name: payments-paymentpspreference-refunds
      description: REST surface for payments-paymentPspReference-refunds.
      operations:
      - method: POST
        name: postpaymentspaymentpspreferencerefunds
        description: Adyen Refund a Captured Payment
        call: checkout-psp.postpaymentspaymentpspreferencerefunds
        with:
          paymentPspReference: rest.paymentPspReference
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/payments/{paymentpspreference}/reversals
      name: payments-paymentpspreference-reversals
      description: REST surface for payments-paymentPspReference-reversals.
      operations:
      - method: POST
        name: postpaymentspaymentpspreferencereversals
        description: Adyen Refund or Cancel a Payment
        call: checkout-psp.postpaymentspaymentpspreferencereversals
        with:
          paymentPspReference: rest.paymentPspReference
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: checkout-psp-mcp
    port: 9090
    transport: http
    description: MCP adapter for Adyen Checkout API — Psp. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: adyen-update-authorised-amount
      description: Adyen Update an Authorised Amount
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: checkout-psp.postpaymentspaymentpspreferenceamountupdates
      with:
        paymentPspReference: tools.paymentPspReference
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: adyen-cancel-authorised-payment
      description: Adyen Cancel an Authorised Payment
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: checkout-psp.postpaymentspaymentpspreferencecancels
      with:
        paymentPspReference: tools.paymentPspReference
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: adyen-capture-authorised-payment
      description: Adyen Capture an Authorised Payment
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: checkout-psp.postpaymentspaymentpspreferencecaptures
      with:
        paymentPspReference: tools.paymentPspReference
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: adyen-refund-captured-payment
      description: Adyen Refund a Captured Payment
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: checkout-psp.postpaymentspaymentpspreferencerefunds
      with:
        paymentPspReference: tools.paymentPspReference
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: adyen-refund-cancel-payment
      description: Adyen Refund or Cancel a Payment
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: checkout-psp.postpaymentspaymentpspreferencereversals
      with:
        paymentPspReference: tools.paymentPspReference
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
