naftiko: 1.0.0-alpha2
info:
  label: Adyen Terminal API — Admin
  description: 'Adyen Terminal API — Admin. 1 operations. Lead operation: Adyen Admin Request. Self-contained Naftiko capability
    covering one Adyen business surface.'
  tags:
  - Adyen
  - Admin
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    ADYEN_API_KEY: ADYEN_API_KEY
capability:
  consumes:
  - type: http
    namespace: terminal-admin
    baseUri: https://terminal-api-test.adyen.com/sync
    description: Adyen Terminal API — Admin business capability. Self-contained, no shared references.
    resources:
    - name: admin
      path: /admin
      operations:
      - name: post
        method: POST
        description: Adyen Admin Request
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
    authentication:
      type: apikey
      key: X-API-Key
      value: '{{env.ADYEN_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: terminal-admin-rest
    port: 8080
    description: REST adapter for Adyen Terminal API — Admin. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/admin
      name: admin
      description: REST surface for admin.
      operations:
      - method: POST
        name: post
        description: Adyen Admin Request
        call: terminal-admin.post
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: terminal-admin-mcp
    port: 9090
    transport: http
    description: MCP adapter for Adyen Terminal API — Admin. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: adyen-admin-request
      description: Adyen Admin Request
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: terminal-admin.post
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
