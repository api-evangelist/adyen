naftiko: 1.0.0-alpha2
info:
  label: Adyen Account API — getUploadedDocuments
  description: 'Adyen Account API — getUploadedDocuments. 1 operations. Lead operation: Adyen Get Documents. Self-contained
    Naftiko capability covering one Adyen business surface.'
  tags:
  - Adyen
  - getUploadedDocuments
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    ADYEN_API_KEY: ADYEN_API_KEY
capability:
  consumes:
  - type: http
    namespace: accounts-getuploadeddocuments
    baseUri: https://cal-test.adyen.com/cal/services/Account/v6
    description: Adyen Account API — getUploadedDocuments business capability. Self-contained, no shared references.
    resources:
    - name: getUploadedDocuments
      path: /getUploadedDocuments
      operations:
      - name: postgetuploadeddocuments
        method: POST
        description: Adyen Get Documents
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
    authentication:
      type: apikey
      key: X-API-Key
      value: '{{env.ADYEN_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: accounts-getuploadeddocuments-rest
    port: 8080
    description: REST adapter for Adyen Account API — getUploadedDocuments. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/getuploadeddocuments
      name: getuploadeddocuments
      description: REST surface for getUploadedDocuments.
      operations:
      - method: POST
        name: postgetuploadeddocuments
        description: Adyen Get Documents
        call: accounts-getuploadeddocuments.postgetuploadeddocuments
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: accounts-getuploadeddocuments-mcp
    port: 9090
    transport: http
    description: MCP adapter for Adyen Account API — getUploadedDocuments. One tool per consumed operation, routed inline
      through this capability's consumes block.
    tools:
    - name: adyen-get-documents
      description: Adyen Get Documents
      hints:
        readOnly: true
        destructive: false
        idempotent: false
      call: accounts-getuploadeddocuments.postgetuploadeddocuments
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
