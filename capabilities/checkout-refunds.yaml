naftiko: 1.0.0-alpha2
info:
  label: Adyen Checkout API — Refunds
  description: 'Adyen Checkout API — Refunds. 1 operations. Lead operation: Adyen Refund a Captured Payment. Self-contained
    Naftiko capability covering one Adyen business surface.'
  tags:
  - Adyen
  - Refunds
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    ADYEN_API_KEY: ADYEN_API_KEY
capability:
  consumes:
  - type: http
    namespace: checkout-refunds
    baseUri: https://checkout-test.adyen.com/v71
    description: Adyen Checkout API — Refunds business capability. Self-contained, no shared references.
    resources:
    - name: payments-paymentPspReference-refunds
      path: /payments/{paymentPspReference}/refunds
      operations:
      - name: postpaymentspaymentpspreferencerefunds
        method: POST
        description: Adyen Refund a Captured Payment
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: paymentPspReference
          in: path
          type: string
          description: The [`pspReference`](https://docs.adyen.com/api-explorer/#/CheckoutService/latest/post/payments__resParam_pspReference)
            of the payment that you want to refund.
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
    authentication:
      type: apikey
      key: X-API-Key
      value: '{{env.ADYEN_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: checkout-refunds-rest
    port: 8080
    description: REST adapter for Adyen Checkout API — Refunds. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/payments/{paymentpspreference}/refunds
      name: payments-paymentpspreference-refunds
      description: REST surface for payments-paymentPspReference-refunds.
      operations:
      - method: POST
        name: postpaymentspaymentpspreferencerefunds
        description: Adyen Refund a Captured Payment
        call: checkout-refunds.postpaymentspaymentpspreferencerefunds
        with:
          paymentPspReference: rest.paymentPspReference
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: checkout-refunds-mcp
    port: 9090
    transport: http
    description: MCP adapter for Adyen Checkout API — Refunds. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: adyen-refund-captured-payment
      description: Adyen Refund a Captured Payment
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: checkout-refunds.postpaymentspaymentpspreferencerefunds
      with:
        paymentPspReference: tools.paymentPspReference
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
