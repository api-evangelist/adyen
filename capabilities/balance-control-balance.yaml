naftiko: 1.0.0-alpha2
info:
  label: Adyen Balance Control API — Balance
  description: 'Adyen Balance Control API — Balance. 1 operations. Lead operation: Adyen Start a Balance Transfer. Self-contained
    Naftiko capability covering one Adyen business surface.'
  tags:
  - Adyen
  - Balance
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    ADYEN_API_KEY: ADYEN_API_KEY
capability:
  consumes:
  - type: http
    namespace: balance-control-balance
    baseUri: https://pal-test.adyen.com/pal/servlet/BalanceControl/v1
    description: Adyen Balance Control API — Balance business capability. Self-contained, no shared references.
    resources:
    - name: balanceTransfer
      path: /balanceTransfer
      operations:
      - name: postbalancetransfer
        method: POST
        description: Adyen Start a Balance Transfer
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
    authentication:
      type: apikey
      key: X-API-Key
      value: '{{env.ADYEN_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: balance-control-balance-rest
    port: 8080
    description: REST adapter for Adyen Balance Control API — Balance. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/balancetransfer
      name: balancetransfer
      description: REST surface for balanceTransfer.
      operations:
      - method: POST
        name: postbalancetransfer
        description: Adyen Start a Balance Transfer
        call: balance-control-balance.postbalancetransfer
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: balance-control-balance-mcp
    port: 9090
    transport: http
    description: MCP adapter for Adyen Balance Control API — Balance. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: adyen-start-balance-transfer
      description: Adyen Start a Balance Transfer
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: balance-control-balance.postbalancetransfer
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
