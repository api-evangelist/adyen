naftiko: 1.0.0-alpha2
info:
  label: Adyen Configuration API — Validate
  description: 'Adyen Configuration API — Validate. 1 operations. Lead operation: Adyen Validate a Bank Account. Self-contained
    Naftiko capability covering one Adyen business surface.'
  tags:
  - Adyen
  - Validate
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    ADYEN_API_KEY: ADYEN_API_KEY
capability:
  consumes:
  - type: http
    namespace: configuration-validate
    baseUri: https://balanceplatform-api-test.adyen.com/bcl/v2
    description: Adyen Configuration API — Validate business capability. Self-contained, no shared references.
    resources:
    - name: validateBankAccountIdentification
      path: /validateBankAccountIdentification
      operations:
      - name: postvalidatebankaccountidentification
        method: POST
        description: Adyen Validate a Bank Account
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
    authentication:
      type: apikey
      key: X-API-Key
      value: '{{env.ADYEN_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: configuration-validate-rest
    port: 8080
    description: REST adapter for Adyen Configuration API — Validate. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/validatebankaccountidentification
      name: validatebankaccountidentification
      description: REST surface for validateBankAccountIdentification.
      operations:
      - method: POST
        name: postvalidatebankaccountidentification
        description: Adyen Validate a Bank Account
        call: configuration-validate.postvalidatebankaccountidentification
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: configuration-validate-mcp
    port: 9090
    transport: http
    description: MCP adapter for Adyen Configuration API — Validate. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: adyen-validate-bank-account
      description: Adyen Validate a Bank Account
      hints:
        readOnly: true
        destructive: false
        idempotent: false
      call: configuration-validate.postvalidatebankaccountidentification
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
