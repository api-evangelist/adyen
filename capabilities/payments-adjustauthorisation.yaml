naftiko: 1.0.0-alpha2
info:
  label: Adyen Payment API — adjustAuthorisation
  description: 'Adyen Payment API — adjustAuthorisation. 1 operations. Lead operation: Adyen Change the Authorised Amount.
    Self-contained Naftiko capability covering one Adyen business surface.'
  tags:
  - Adyen
  - adjustAuthorisation
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    ADYEN_API_KEY: ADYEN_API_KEY
capability:
  consumes:
  - type: http
    namespace: payments-adjustauthorisation
    baseUri: https://pal-test.adyen.com/pal/servlet/Payment/v68
    description: Adyen Payment API — adjustAuthorisation business capability. Self-contained, no shared references.
    resources:
    - name: adjustAuthorisation
      path: /adjustAuthorisation
      operations:
      - name: postadjustauthorisation
        method: POST
        description: Adyen Change the Authorised Amount
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
    authentication:
      type: apikey
      key: X-API-Key
      value: '{{env.ADYEN_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: payments-adjustauthorisation-rest
    port: 8080
    description: REST adapter for Adyen Payment API — adjustAuthorisation. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/adjustauthorisation
      name: adjustauthorisation
      description: REST surface for adjustAuthorisation.
      operations:
      - method: POST
        name: postadjustauthorisation
        description: Adyen Change the Authorised Amount
        call: payments-adjustauthorisation.postadjustauthorisation
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: payments-adjustauthorisation-mcp
    port: 9090
    transport: http
    description: MCP adapter for Adyen Payment API — adjustAuthorisation. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: adyen-change-authorised-amount
      description: Adyen Change the Authorised Amount
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: payments-adjustauthorisation.postadjustauthorisation
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
