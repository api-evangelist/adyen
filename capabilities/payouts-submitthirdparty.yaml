naftiko: 1.0.0-alpha2
info:
  label: Adyen Payout API — submitThirdParty
  description: 'Adyen Payout API — submitThirdParty. 1 operations. Lead operation: Adyen Submit a Payout. Self-contained Naftiko
    capability covering one Adyen business surface.'
  tags:
  - Adyen
  - submitThirdParty
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    ADYEN_API_KEY: ADYEN_API_KEY
capability:
  consumes:
  - type: http
    namespace: payouts-submitthirdparty
    baseUri: https://pal-test.adyen.com/pal/servlet/Payout/v68
    description: Adyen Payout API — submitThirdParty business capability. Self-contained, no shared references.
    resources:
    - name: submitThirdParty
      path: /submitThirdParty
      operations:
      - name: postsubmitthirdparty
        method: POST
        description: Adyen Submit a Payout
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
    authentication:
      type: apikey
      key: X-API-Key
      value: '{{env.ADYEN_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: payouts-submitthirdparty-rest
    port: 8080
    description: REST adapter for Adyen Payout API — submitThirdParty. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/submitthirdparty
      name: submitthirdparty
      description: REST surface for submitThirdParty.
      operations:
      - method: POST
        name: postsubmitthirdparty
        description: Adyen Submit a Payout
        call: payouts-submitthirdparty.postsubmitthirdparty
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: payouts-submitthirdparty-mcp
    port: 9090
    transport: http
    description: MCP adapter for Adyen Payout API — submitThirdParty. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: adyen-submit-payout
      description: Adyen Submit a Payout
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: payouts-submitthirdparty.postsubmitthirdparty
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
