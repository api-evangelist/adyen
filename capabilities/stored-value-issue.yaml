naftiko: 1.0.0-alpha2
info:
  label: Adyen Stored Value API — Issue
  description: 'Adyen Stored Value API — Issue. 1 operations. Lead operation: Adyen Issues a New Card.. Self-contained Naftiko
    capability covering one Adyen business surface.'
  tags:
  - Adyen
  - Issue
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    ADYEN_API_KEY: ADYEN_API_KEY
capability:
  consumes:
  - type: http
    namespace: stored-value-issue
    baseUri: https://pal-test.adyen.com/pal/servlet/StoredValue/v46
    description: Adyen Stored Value API — Issue business capability. Self-contained, no shared references.
    resources:
    - name: issue
      path: /issue
      operations:
      - name: postissue
        method: POST
        description: Adyen Issues a New Card.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
    authentication:
      type: apikey
      key: X-API-Key
      value: '{{env.ADYEN_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: stored-value-issue-rest
    port: 8080
    description: REST adapter for Adyen Stored Value API — Issue. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/issue
      name: issue
      description: REST surface for issue.
      operations:
      - method: POST
        name: postissue
        description: Adyen Issues a New Card.
        call: stored-value-issue.postissue
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: stored-value-issue-mcp
    port: 9090
    transport: http
    description: MCP adapter for Adyen Stored Value API — Issue. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: adyen-issues-new-card
      description: Adyen Issues a New Card.
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: stored-value-issue.postissue
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
