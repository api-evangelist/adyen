naftiko: 1.0.0-alpha2
info:
  label: Adyen Configuration API — Forms
  description: 'Adyen Configuration API — Forms. 1 operations. Lead operation: Adyen Get a Tax Form. Self-contained Naftiko
    capability covering one Adyen business surface.'
  tags:
  - Adyen
  - Forms
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    ADYEN_API_KEY: ADYEN_API_KEY
capability:
  consumes:
  - type: http
    namespace: configuration-forms
    baseUri: https://balanceplatform-api-test.adyen.com/bcl/v2
    description: Adyen Configuration API — Forms business capability. Self-contained, no shared references.
    resources:
    - name: accountHolders-id-taxForms
      path: /accountHolders/{id}/taxForms
      operations:
      - name: getaccountholdersidtaxforms
        method: GET
        description: Adyen Get a Tax Form
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id
          in: path
          type: string
          description: The unique identifier of the account holder.
          required: true
        - name: formType
          in: query
          type: string
          description: The type of tax form you want to retrieve. Accepted values are **US1099k** and **US1099nec**
          required: true
        - name: year
          in: query
          type: integer
          description: The tax year in YYYY format for the tax form you want to retrieve
          required: true
    authentication:
      type: apikey
      key: X-API-Key
      value: '{{env.ADYEN_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: configuration-forms-rest
    port: 8080
    description: REST adapter for Adyen Configuration API — Forms. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/accountholders/{id}/taxforms
      name: accountholders-id-taxforms
      description: REST surface for accountHolders-id-taxForms.
      operations:
      - method: GET
        name: getaccountholdersidtaxforms
        description: Adyen Get a Tax Form
        call: configuration-forms.getaccountholdersidtaxforms
        with:
          id: rest.id
          formType: rest.formType
          year: rest.year
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: configuration-forms-mcp
    port: 9090
    transport: http
    description: MCP adapter for Adyen Configuration API — Forms. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: adyen-get-tax-form
      description: Adyen Get a Tax Form
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: configuration-forms.getaccountholdersidtaxforms
      with:
        id: tools.id
        formType: tools.formType
        year: tools.year
      outputParameters:
      - type: object
        mapping: $.
