naftiko: 1.0.0-alpha2
info:
  label: Adyen Checkout API — Cancels
  description: 'Adyen Checkout API — Cancels. 1 operations. Lead operation: Adyen Cancel an Authorised Payment. Self-contained
    Naftiko capability covering one Adyen business surface.'
  tags:
  - Adyen
  - Cancels
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    ADYEN_API_KEY: ADYEN_API_KEY
capability:
  consumes:
  - type: http
    namespace: checkout-cancels-2
    baseUri: https://checkout-test.adyen.com/v71
    description: Adyen Checkout API — Cancels business capability. Self-contained, no shared references.
    resources:
    - name: cancels
      path: /cancels
      operations:
      - name: postcancels
        method: POST
        description: Adyen Cancel an Authorised Payment
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
    authentication:
      type: apikey
      key: X-API-Key
      value: '{{env.ADYEN_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: checkout-cancels-2-rest
    port: 8080
    description: REST adapter for Adyen Checkout API — Cancels. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/cancels
      name: cancels
      description: REST surface for cancels.
      operations:
      - method: POST
        name: postcancels
        description: Adyen Cancel an Authorised Payment
        call: checkout-cancels-2.postcancels
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: checkout-cancels-2-mcp
    port: 9090
    transport: http
    description: MCP adapter for Adyen Checkout API — Cancels. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: adyen-cancel-authorised-payment
      description: Adyen Cancel an Authorised Payment
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: checkout-cancels-2.postcancels
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
