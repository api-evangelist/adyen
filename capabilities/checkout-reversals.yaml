naftiko: 1.0.0-alpha2
info:
  label: Adyen Checkout API — Reversals
  description: 'Adyen Checkout API — Reversals. 1 operations. Lead operation: Adyen Refund or Cancel a Payment. Self-contained
    Naftiko capability covering one Adyen business surface.'
  tags:
  - Adyen
  - Reversals
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    ADYEN_API_KEY: ADYEN_API_KEY
capability:
  consumes:
  - type: http
    namespace: checkout-reversals
    baseUri: https://checkout-test.adyen.com/v71
    description: Adyen Checkout API — Reversals business capability. Self-contained, no shared references.
    resources:
    - name: payments-paymentPspReference-reversals
      path: /payments/{paymentPspReference}/reversals
      operations:
      - name: postpaymentspaymentpspreferencereversals
        method: POST
        description: Adyen Refund or Cancel a Payment
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: paymentPspReference
          in: path
          type: string
          description: The [`pspReference`](https://docs.adyen.com/api-explorer/#/CheckoutService/latest/post/payments__resParam_pspReference)
            of the payment that you want to reverse.
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
    authentication:
      type: apikey
      key: X-API-Key
      value: '{{env.ADYEN_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: checkout-reversals-rest
    port: 8080
    description: REST adapter for Adyen Checkout API — Reversals. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/payments/{paymentpspreference}/reversals
      name: payments-paymentpspreference-reversals
      description: REST surface for payments-paymentPspReference-reversals.
      operations:
      - method: POST
        name: postpaymentspaymentpspreferencereversals
        description: Adyen Refund or Cancel a Payment
        call: checkout-reversals.postpaymentspaymentpspreferencereversals
        with:
          paymentPspReference: rest.paymentPspReference
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: checkout-reversals-mcp
    port: 9090
    transport: http
    description: MCP adapter for Adyen Checkout API — Reversals. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: adyen-refund-cancel-payment
      description: Adyen Refund or Cancel a Payment
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: checkout-reversals.postpaymentspaymentpspreferencereversals
      with:
        paymentPspReference: tools.paymentPspReference
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
