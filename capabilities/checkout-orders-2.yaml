naftiko: 1.0.0-alpha2
info:
  label: Adyen Checkout API — Orders
  description: 'Adyen Checkout API — Orders. 2 operations. Lead operation: Adyen Create an Order. Self-contained Naftiko capability
    covering one Adyen business surface.'
  tags:
  - Adyen
  - Orders
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    ADYEN_API_KEY: ADYEN_API_KEY
capability:
  consumes:
  - type: http
    namespace: checkout-orders-2
    baseUri: https://checkout-test.adyen.com/v71
    description: Adyen Checkout API — Orders business capability. Self-contained, no shared references.
    resources:
    - name: orders
      path: /orders
      operations:
      - name: postorders
        method: POST
        description: Adyen Create an Order
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
    - name: orders-cancel
      path: /orders/cancel
      operations:
      - name: postorderscancel
        method: POST
        description: Adyen Cancel an Order
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
    authentication:
      type: apikey
      key: X-API-Key
      value: '{{env.ADYEN_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: checkout-orders-2-rest
    port: 8080
    description: REST adapter for Adyen Checkout API — Orders. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/orders
      name: orders
      description: REST surface for orders.
      operations:
      - method: POST
        name: postorders
        description: Adyen Create an Order
        call: checkout-orders-2.postorders
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/orders/cancel
      name: orders-cancel
      description: REST surface for orders-cancel.
      operations:
      - method: POST
        name: postorderscancel
        description: Adyen Cancel an Order
        call: checkout-orders-2.postorderscancel
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: checkout-orders-2-mcp
    port: 9090
    transport: http
    description: MCP adapter for Adyen Checkout API — Orders. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: adyen-create-order
      description: Adyen Create an Order
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: checkout-orders-2.postorders
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: adyen-cancel-order
      description: Adyen Cancel an Order
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: checkout-orders-2.postorderscancel
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
