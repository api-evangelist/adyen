naftiko: 1.0.0-alpha2
info:
  label: Adyen Management API — Stores
  description: 'Adyen Management API — Stores. 8 operations. Lead operation: Adyen Get a List of Stores. Self-contained Naftiko
    capability covering one Adyen business surface.'
  tags:
  - Adyen
  - Stores
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    ADYEN_API_KEY: ADYEN_API_KEY
capability:
  consumes:
  - type: http
    namespace: management-stores
    baseUri: https://management-test.adyen.com/v3
    description: Adyen Management API — Stores business capability. Self-contained, no shared references.
    resources:
    - name: stores
      path: /stores
      operations:
      - name: getstores
        method: GET
        description: Adyen Get a List of Stores
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: pageNumber
          in: query
          type: integer
          description: The number of the page to fetch.
        - name: pageSize
          in: query
          type: integer
          description: The number of items to have on a page, maximum 100. The default is 10 items on a page.
        - name: reference
          in: query
          type: string
          description: The reference of the store.
        - name: merchantId
          in: query
          type: string
          description: The unique identifier of the merchant account.
      - name: poststores
        method: POST
        description: Adyen Create a Store
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
    - name: stores-storeId
      path: /stores/{storeId}
      operations:
      - name: getstoresstoreid
        method: GET
        description: Adyen Get a Store
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: storeId
          in: path
          type: string
          description: The unique identifier of the store.
          required: true
      - name: patchstoresstoreid
        method: PATCH
        description: Adyen Update a Store
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: storeId
          in: path
          type: string
          description: The unique identifier of the store.
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
    - name: stores-storeId-terminalLogos
      path: /stores/{storeId}/terminalLogos
      operations:
      - name: getstoresstoreidterminallogos
        method: GET
        description: Adyen Get the Terminal Logo
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: storeId
          in: path
          type: string
          description: The unique identifier of the store.
          required: true
        - name: model
          in: query
          type: string
          description: 'The terminal model. Possible values: E355, VX675WIFIBT, VX680, VX690, VX700, VX820, M400, MX925, P400Plus,
            UX300, UX410, V200cPlus, V240mPlus, V400cPlus, V400m,'
          required: true
      - name: patchstoresstoreidterminallogos
        method: PATCH
        description: Adyen Update the Terminal Logo
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: storeId
          in: path
          type: string
          description: The unique identifier of the store.
          required: true
        - name: model
          in: query
          type: string
          description: 'The terminal model. Possible values: E355, VX675WIFIBT, VX680, VX690, VX700, VX820, M400, MX925, P400Plus,
            UX300, UX410, V200cPlus, V240mPlus, V400cPlus, V400m,'
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
    - name: stores-storeId-terminalSettings
      path: /stores/{storeId}/terminalSettings
      operations:
      - name: getstoresstoreidterminalsettings
        method: GET
        description: Adyen Get Terminal Settings
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: storeId
          in: path
          type: string
          description: The unique identifier of the store.
          required: true
      - name: patchstoresstoreidterminalsettings
        method: PATCH
        description: Adyen Update Terminal Settings
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: storeId
          in: path
          type: string
          description: The unique identifier of the store.
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
    authentication:
      type: apikey
      key: X-API-Key
      value: '{{env.ADYEN_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: management-stores-rest
    port: 8080
    description: REST adapter for Adyen Management API — Stores. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/stores
      name: stores
      description: REST surface for stores.
      operations:
      - method: GET
        name: getstores
        description: Adyen Get a List of Stores
        call: management-stores.getstores
        with:
          pageNumber: rest.pageNumber
          pageSize: rest.pageSize
          reference: rest.reference
          merchantId: rest.merchantId
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: poststores
        description: Adyen Create a Store
        call: management-stores.poststores
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/stores/{storeid}
      name: stores-storeid
      description: REST surface for stores-storeId.
      operations:
      - method: GET
        name: getstoresstoreid
        description: Adyen Get a Store
        call: management-stores.getstoresstoreid
        with:
          storeId: rest.storeId
        outputParameters:
        - type: object
          mapping: $.
      - method: PATCH
        name: patchstoresstoreid
        description: Adyen Update a Store
        call: management-stores.patchstoresstoreid
        with:
          storeId: rest.storeId
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/stores/{storeid}/terminallogos
      name: stores-storeid-terminallogos
      description: REST surface for stores-storeId-terminalLogos.
      operations:
      - method: GET
        name: getstoresstoreidterminallogos
        description: Adyen Get the Terminal Logo
        call: management-stores.getstoresstoreidterminallogos
        with:
          storeId: rest.storeId
          model: rest.model
        outputParameters:
        - type: object
          mapping: $.
      - method: PATCH
        name: patchstoresstoreidterminallogos
        description: Adyen Update the Terminal Logo
        call: management-stores.patchstoresstoreidterminallogos
        with:
          storeId: rest.storeId
          model: rest.model
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/stores/{storeid}/terminalsettings
      name: stores-storeid-terminalsettings
      description: REST surface for stores-storeId-terminalSettings.
      operations:
      - method: GET
        name: getstoresstoreidterminalsettings
        description: Adyen Get Terminal Settings
        call: management-stores.getstoresstoreidterminalsettings
        with:
          storeId: rest.storeId
        outputParameters:
        - type: object
          mapping: $.
      - method: PATCH
        name: patchstoresstoreidterminalsettings
        description: Adyen Update Terminal Settings
        call: management-stores.patchstoresstoreidterminalsettings
        with:
          storeId: rest.storeId
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: management-stores-mcp
    port: 9090
    transport: http
    description: MCP adapter for Adyen Management API — Stores. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: adyen-get-list-stores
      description: Adyen Get a List of Stores
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: management-stores.getstores
      with:
        pageNumber: tools.pageNumber
        pageSize: tools.pageSize
        reference: tools.reference
        merchantId: tools.merchantId
      outputParameters:
      - type: object
        mapping: $.
    - name: adyen-create-store
      description: Adyen Create a Store
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: management-stores.poststores
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: adyen-get-store
      description: Adyen Get a Store
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: management-stores.getstoresstoreid
      with:
        storeId: tools.storeId
      outputParameters:
      - type: object
        mapping: $.
    - name: adyen-update-store
      description: Adyen Update a Store
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: management-stores.patchstoresstoreid
      with:
        storeId: tools.storeId
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: adyen-get-terminal-logo
      description: Adyen Get the Terminal Logo
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: management-stores.getstoresstoreidterminallogos
      with:
        storeId: tools.storeId
        model: tools.model
      outputParameters:
      - type: object
        mapping: $.
    - name: adyen-update-terminal-logo
      description: Adyen Update the Terminal Logo
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: management-stores.patchstoresstoreidterminallogos
      with:
        storeId: tools.storeId
        model: tools.model
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: adyen-get-terminal-settings
      description: Adyen Get Terminal Settings
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: management-stores.getstoresstoreidterminalsettings
      with:
        storeId: tools.storeId
      outputParameters:
      - type: object
        mapping: $.
    - name: adyen-update-terminal-settings
      description: Adyen Update Terminal Settings
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: management-stores.patchstoresstoreidterminalsettings
      with:
        storeId: tools.storeId
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
