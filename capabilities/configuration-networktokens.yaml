naftiko: 1.0.0-alpha2
info:
  label: Adyen Configuration API — networkTokens
  description: 'Adyen Configuration API — networkTokens. 2 operations. Lead operation: Adyen Get a Network Token. Self-contained
    Naftiko capability covering one Adyen business surface.'
  tags:
  - Adyen
  - networkTokens
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    ADYEN_API_KEY: ADYEN_API_KEY
capability:
  consumes:
  - type: http
    namespace: configuration-networktokens
    baseUri: https://balanceplatform-api-test.adyen.com/bcl/v2
    description: Adyen Configuration API — networkTokens business capability. Self-contained, no shared references.
    resources:
    - name: networkTokens-networkTokenId
      path: /networkTokens/{networkTokenId}
      operations:
      - name: getnetworktokensnetworktokenid
        method: GET
        description: Adyen Get a Network Token
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: networkTokenId
          in: path
          type: string
          description: The unique identifier of the network token.
          required: true
      - name: patchnetworktokensnetworktokenid
        method: PATCH
        description: Adyen Update a Network Token
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: networkTokenId
          in: path
          type: string
          description: The unique identifier of the network token.
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
    authentication:
      type: apikey
      key: X-API-Key
      value: '{{env.ADYEN_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: configuration-networktokens-rest
    port: 8080
    description: REST adapter for Adyen Configuration API — networkTokens. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/networktokens/{networktokenid}
      name: networktokens-networktokenid
      description: REST surface for networkTokens-networkTokenId.
      operations:
      - method: GET
        name: getnetworktokensnetworktokenid
        description: Adyen Get a Network Token
        call: configuration-networktokens.getnetworktokensnetworktokenid
        with:
          networkTokenId: rest.networkTokenId
        outputParameters:
        - type: object
          mapping: $.
      - method: PATCH
        name: patchnetworktokensnetworktokenid
        description: Adyen Update a Network Token
        call: configuration-networktokens.patchnetworktokensnetworktokenid
        with:
          networkTokenId: rest.networkTokenId
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: configuration-networktokens-mcp
    port: 9090
    transport: http
    description: MCP adapter for Adyen Configuration API — networkTokens. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: adyen-get-network-token
      description: Adyen Get a Network Token
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: configuration-networktokens.getnetworktokensnetworktokenid
      with:
        networkTokenId: tools.networkTokenId
      outputParameters:
      - type: object
        mapping: $.
    - name: adyen-update-network-token
      description: Adyen Update a Network Token
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: configuration-networktokens.patchnetworktokensnetworktokenid
      with:
        networkTokenId: tools.networkTokenId
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
