naftiko: "1.0.0-alpha1"

info:
  label: "Adyen Payments API"
  description: "Classic Adyen Payment API for initiating, settling, and modifying payments including card payments, bank transfers, and ewallets."
  tags:
    - Adyen
    - Payments
    - Cards
    - 3D Secure
  created: "2026-04-19"
  modified: "2026-04-19"

binds:
  - namespace: env
    keys:
      ADYEN_API_KEY: ADYEN_API_KEY

capability:
  consumes:
    - type: http
      namespace: payments
      baseUri: https://pal-test.adyen.com/pal/servlet/Payment/v68
      description: "Adyen classic Payment API."
      authentication:
        type: apikey
        key: X-API-Key
        value: "{{ADYEN_API_KEY}}"
        placement: header
      resources:
        - name: authorise
          path: /authorise
          description: "Authorise a payment."
          operations:
            - name: authorise-payment
              method: POST
              description: "Authorise a payment request."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: capture
          path: /capture
          description: "Capture an authorised payment."
          operations:
            - name: capture-payment
              method: POST
              description: "Capture a previously authorised payment."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: refund
          path: /refund
          description: "Refund a payment."
          operations:
            - name: refund-payment
              method: POST
              description: "Refund a captured payment."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: cancel
          path: /cancel
          description: "Cancel an authorised payment."
          operations:
            - name: cancel-payment
              method: POST
              description: "Cancel an authorised payment."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

  exposes:
    - type: rest
      port: 8101
      namespace: adyen-payments-rest
      resources:
        - path: /v1/authorise
          name: authorise
          description: "Authorise payments."
          operations:
            - method: POST
              name: authorise-payment
              description: "Authorise a payment."
              call: "payments.authorise-payment"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      port: 9101
      namespace: adyen-payments-mcp
      transport: http
      tools:
        - name: authorise-payment
          description: "Authorise a payment using Adyen Payment API."
          hints:
            readOnly: false
            destructive: false
          call: "payments.authorise-payment"
          outputParameters:
            - type: object
              mapping: "$."
        - name: capture-payment
          description: "Capture a previously authorised payment."
          hints:
            readOnly: false
            destructive: false
          call: "payments.capture-payment"
          outputParameters:
            - type: object
              mapping: "$."
        - name: refund-captured-payment
          description: "Refund a captured payment."
          hints:
            readOnly: false
            destructive: false
          call: "payments.refund-payment"
          outputParameters:
            - type: object
              mapping: "$."
