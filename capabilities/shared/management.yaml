naftiko: "1.0.0-alpha1"

info:
  label: "Adyen Management API"
  description: "Configure and manage Adyen company and merchant accounts, stores, and payment terminals."
  tags:
    - Adyen
    - Management
    - Merchants
    - Terminals
    - Configuration
  created: "2026-04-19"
  modified: "2026-04-19"

binds:
  - namespace: env
    keys:
      ADYEN_MANAGEMENT_API_KEY: ADYEN_MANAGEMENT_API_KEY

capability:
  consumes:
    - type: http
      namespace: management
      baseUri: https://management-test.adyen.com/v3
      description: "Adyen Management API for account and terminal configuration."
      authentication:
        type: apikey
        key: X-API-Key
        value: "{{ADYEN_MANAGEMENT_API_KEY}}"
        placement: header
      resources:
        - name: merchants
          path: /merchants
          description: "Manage merchant accounts."
          operations:
            - name: list-merchants
              method: GET
              description: "List all merchant accounts."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: get-merchant
              method: GET
              description: "Get a specific merchant account."
              inputParameters:
                - name: merchantId
                  in: path
                  type: string
                  required: true
                  description: "The merchant account identifier."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: stores
          path: /merchants/{merchantId}/stores
          description: "Manage merchant stores."
          operations:
            - name: list-stores
              method: GET
              description: "List all stores for a merchant."
              inputParameters:
                - name: merchantId
                  in: path
                  type: string
                  required: true
                  description: "The merchant account identifier."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: terminals
          path: /merchants/{merchantId}/terminals
          description: "Manage payment terminals."
          operations:
            - name: list-terminals
              method: GET
              description: "List all payment terminals for a merchant."
              inputParameters:
                - name: merchantId
                  in: path
                  type: string
                  required: true
                  description: "The merchant account identifier."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: payment-methods
          path: /merchants/{merchantId}/paymentMethodSettings
          description: "Manage payment method settings."
          operations:
            - name: list-payment-methods
              method: GET
              description: "List payment method settings for a merchant."
              inputParameters:
                - name: merchantId
                  in: path
                  type: string
                  required: true
                  description: "The merchant account identifier."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

  exposes:
    - type: rest
      port: 8102
      namespace: adyen-management-rest
      resources:
        - path: /v1/merchants
          name: merchants
          description: "Manage merchant accounts."
          operations:
            - method: GET
              name: list-merchants
              description: "List merchants."
              call: "management.list-merchants"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/merchants/{merchantId}/stores
          name: stores
          description: "Manage stores."
          operations:
            - method: GET
              name: list-stores
              description: "List stores for a merchant."
              call: "management.list-stores"
              with:
                merchantId: "rest.merchantId"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/merchants/{merchantId}/terminals
          name: terminals
          description: "Manage terminals."
          operations:
            - method: GET
              name: list-terminals
              description: "List terminals for a merchant."
              call: "management.list-terminals"
              with:
                merchantId: "rest.merchantId"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      port: 9102
      namespace: adyen-management-mcp
      transport: http
      tools:
        - name: list-merchants
          description: "List all merchant accounts in Adyen."
          hints:
            readOnly: true
            destructive: false
          call: "management.list-merchants"
          outputParameters:
            - type: object
              mapping: "$."
        - name: get-merchant
          description: "Get details of a specific merchant account."
          hints:
            readOnly: true
            destructive: false
          call: "management.get-merchant"
          with:
            merchantId: "tools.merchantId"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-stores
          description: "List all stores for a merchant account."
          hints:
            readOnly: true
            destructive: false
          call: "management.list-stores"
          with:
            merchantId: "tools.merchantId"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-terminals
          description: "List all payment terminals for a merchant account."
          hints:
            readOnly: true
            destructive: false
          call: "management.list-terminals"
          with:
            merchantId: "tools.merchantId"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-payment-method-settings
          description: "List payment method settings for a merchant."
          hints:
            readOnly: true
            destructive: false
          call: "management.list-payment-methods"
          with:
            merchantId: "tools.merchantId"
          outputParameters:
            - type: object
              mapping: "$."
