naftiko: "1.0.0-alpha1"

info:
  label: "Adyen Configuration API"
  description: "Create and configure balance platform accounts, account holders, balance accounts, cards, and transaction rules."
  tags:
    - Adyen
    - Configuration
    - Balance Platform
    - Account Holders
    - Cards
  created: "2026-04-19"
  modified: "2026-04-19"

binds:
  - namespace: env
    keys:
      ADYEN_BALANCE_PLATFORM_API_KEY: ADYEN_BALANCE_PLATFORM_API_KEY

capability:
  consumes:
    - type: http
      namespace: configuration
      baseUri: https://balanceplatform-api-test.adyen.com/bcl/v2
      description: "Adyen Balance Platform Configuration API."
      authentication:
        type: apikey
        key: X-API-Key
        value: "{{ADYEN_BALANCE_PLATFORM_API_KEY}}"
        placement: header
      resources:
        - name: account-holders
          path: /accountHolders
          description: "Manage account holders."
          operations:
            - name: create-account-holder
              method: POST
              description: "Create an account holder."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: get-account-holder
              method: GET
              description: "Get an account holder."
              inputParameters:
                - name: id
                  in: path
                  type: string
                  required: true
                  description: "The account holder identifier."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: balance-accounts
          path: /balanceAccounts
          description: "Manage balance accounts."
          operations:
            - name: create-balance-account
              method: POST
              description: "Create a balance account."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: get-balance-account
              method: GET
              description: "Get a balance account."
              inputParameters:
                - name: id
                  in: path
                  type: string
                  required: true
                  description: "The balance account identifier."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: payment-instruments
          path: /paymentInstruments
          description: "Manage payment instruments including cards."
          operations:
            - name: create-payment-instrument
              method: POST
              description: "Create a payment instrument (card)."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

  exposes:
    - type: rest
      port: 8104
      namespace: adyen-configuration-rest
      resources:
        - path: /v1/account-holders
          name: account-holders
          description: "Manage account holders."
          operations:
            - method: POST
              name: create-account-holder
              description: "Create an account holder."
              call: "configuration.create-account-holder"
              outputParameters:
                - type: object
                  mapping: "$."
            - method: GET
              name: get-account-holder
              description: "Get an account holder."
              call: "configuration.get-account-holder"
              with:
                id: "rest.id"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/balance-accounts
          name: balance-accounts
          description: "Manage balance accounts."
          operations:
            - method: POST
              name: create-balance-account
              description: "Create a balance account."
              call: "configuration.create-balance-account"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      port: 9104
      namespace: adyen-configuration-mcp
      transport: http
      tools:
        - name: create-account-holder
          description: "Create a new account holder on the Adyen balance platform."
          hints:
            readOnly: false
            destructive: false
          call: "configuration.create-account-holder"
          outputParameters:
            - type: object
              mapping: "$."
        - name: get-account-holder
          description: "Retrieve details of an account holder."
          hints:
            readOnly: true
            destructive: false
          call: "configuration.get-account-holder"
          with:
            id: "tools.id"
          outputParameters:
            - type: object
              mapping: "$."
        - name: create-balance-account
          description: "Create a balance account for an account holder."
          hints:
            readOnly: false
            destructive: false
          call: "configuration.create-balance-account"
          outputParameters:
            - type: object
              mapping: "$."
        - name: get-balance-account
          description: "Get details of a balance account."
          hints:
            readOnly: true
            destructive: false
          call: "configuration.get-balance-account"
          with:
            id: "tools.id"
          outputParameters:
            - type: object
              mapping: "$."
        - name: create-payment-instrument
          description: "Create a payment instrument (card) for an account holder."
          hints:
            readOnly: false
            destructive: false
          call: "configuration.create-payment-instrument"
          outputParameters:
            - type: object
              mapping: "$."
