naftiko: "1.0.0-alpha1"

info:
  label: "Adyen Disputes API"
  description: "Automate dispute and chargeback handling including retrieving defense reasons, submitting defense documents, and accepting or defending disputes."
  tags:
    - Adyen
    - Disputes
    - Chargebacks
    - Risk Management
  created: "2026-04-19"
  modified: "2026-04-19"

binds:
  - namespace: env
    keys:
      ADYEN_API_KEY: ADYEN_API_KEY

capability:
  consumes:
    - type: http
      namespace: disputes
      baseUri: https://ca-test.adyen.com/ca/services/DisputeService/v30
      description: "Adyen Disputes API for chargeback and dispute management."
      authentication:
        type: apikey
        key: X-API-Key
        value: "{{ADYEN_API_KEY}}"
        placement: header
      resources:
        - name: disputes
          path: /retrieveApplicableDefenseReasons
          description: "Retrieve dispute defense reasons."
          operations:
            - name: get-defense-reasons
              method: POST
              description: "Retrieve the defense reasons applicable for a dispute."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: defense-documents
          path: /supplyDefenseDocument
          description: "Supply defense documents for disputes."
          operations:
            - name: supply-defense-document
              method: POST
              description: "Submit a defense document for a dispute."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: accept-dispute
          path: /acceptDispute
          description: "Accept a dispute."
          operations:
            - name: accept-dispute
              method: POST
              description: "Accept a dispute and let the chargeback proceed."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

  exposes:
    - type: rest
      port: 8103
      namespace: adyen-disputes-rest
      resources:
        - path: /v1/disputes/defense-reasons
          name: defense-reasons
          description: "Get dispute defense reasons."
          operations:
            - method: POST
              name: get-defense-reasons
              description: "Get defense reasons for a dispute."
              call: "disputes.get-defense-reasons"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/disputes/accept
          name: accept-dispute
          description: "Accept a dispute."
          operations:
            - method: POST
              name: accept-dispute
              description: "Accept a chargeback dispute."
              call: "disputes.accept-dispute"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      port: 9103
      namespace: adyen-disputes-mcp
      transport: http
      tools:
        - name: get-dispute-defense-reasons
          description: "Retrieve applicable defense reasons for a dispute."
          hints:
            readOnly: true
            destructive: false
          call: "disputes.get-defense-reasons"
          outputParameters:
            - type: object
              mapping: "$."
        - name: supply-defense-document
          description: "Submit a defense document for a chargeback dispute."
          hints:
            readOnly: false
            destructive: false
          call: "disputes.supply-defense-document"
          outputParameters:
            - type: object
              mapping: "$."
        - name: accept-dispute
          description: "Accept a dispute and let the chargeback proceed."
          hints:
            readOnly: false
            destructive: true
          call: "disputes.accept-dispute"
          outputParameters:
            - type: object
              mapping: "$."
