naftiko: 1.0.0-alpha2
info:
  label: Adyen Account API — Methods
  description: 'Adyen Account API — Methods. 1 operations. Lead operation: Adyen Delete Payout Methods. Self-contained Naftiko
    capability covering one Adyen business surface.'
  tags:
  - Adyen
  - Methods
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    ADYEN_API_KEY: ADYEN_API_KEY
capability:
  consumes:
  - type: http
    namespace: account-methods
    baseUri: https://cal-test.adyen.com/cal/services/Account/v6
    description: Adyen Account API — Methods business capability. Self-contained, no shared references.
    resources:
    - name: deletePayoutMethods
      path: /deletePayoutMethods
      operations:
      - name: postdeletepayoutmethods
        method: POST
        description: Adyen Delete Payout Methods
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
    authentication:
      type: apikey
      key: X-API-Key
      value: '{{env.ADYEN_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: account-methods-rest
    port: 8080
    description: REST adapter for Adyen Account API — Methods. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/deletepayoutmethods
      name: deletepayoutmethods
      description: REST surface for deletePayoutMethods.
      operations:
      - method: POST
        name: postdeletepayoutmethods
        description: Adyen Delete Payout Methods
        call: account-methods.postdeletepayoutmethods
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: account-methods-mcp
    port: 9090
    transport: http
    description: MCP adapter for Adyen Account API — Methods. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: adyen-delete-payout-methods
      description: Adyen Delete Payout Methods
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: account-methods.postdeletepayoutmethods
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
