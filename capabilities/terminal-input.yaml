naftiko: 1.0.0-alpha2
info:
  label: Adyen Terminal API — Input
  description: 'Adyen Terminal API — Input. 1 operations. Lead operation: Adyen Input Request. Self-contained Naftiko capability
    covering one Adyen business surface.'
  tags:
  - Adyen
  - Input
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    ADYEN_API_KEY: ADYEN_API_KEY
capability:
  consumes:
  - type: http
    namespace: terminal-input
    baseUri: https://terminal-api-test.adyen.com/sync
    description: Adyen Terminal API — Input business capability. Self-contained, no shared references.
    resources:
    - name: input
      path: /input
      operations:
      - name: post
        method: POST
        description: Adyen Input Request
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
    authentication:
      type: apikey
      key: X-API-Key
      value: '{{env.ADYEN_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: terminal-input-rest
    port: 8080
    description: REST adapter for Adyen Terminal API — Input. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/input
      name: input
      description: REST surface for input.
      operations:
      - method: POST
        name: post
        description: Adyen Input Request
        call: terminal-input.post
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: terminal-input-mcp
    port: 9090
    transport: http
    description: MCP adapter for Adyen Terminal API — Input. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: adyen-input-request
      description: Adyen Input Request
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: terminal-input.post
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
