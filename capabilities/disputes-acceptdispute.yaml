naftiko: 1.0.0-alpha2
info:
  label: Adyen Disputes API — acceptDispute
  description: 'Adyen Disputes API — acceptDispute. 1 operations. Lead operation: Adyen Accept a Dispute. Self-contained Naftiko
    capability covering one Adyen business surface.'
  tags:
  - Adyen
  - acceptDispute
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    ADYEN_API_KEY: ADYEN_API_KEY
capability:
  consumes:
  - type: http
    namespace: disputes-acceptdispute
    baseUri: https://ca-test.adyen.com/ca/services/DisputeService/v30
    description: Adyen Disputes API — acceptDispute business capability. Self-contained, no shared references.
    resources:
    - name: acceptDispute
      path: /acceptDispute
      operations:
      - name: postacceptdispute
        method: POST
        description: Adyen Accept a Dispute
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
    authentication:
      type: apikey
      key: X-API-Key
      value: '{{env.ADYEN_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: disputes-acceptdispute-rest
    port: 8080
    description: REST adapter for Adyen Disputes API — acceptDispute. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/acceptdispute
      name: acceptdispute
      description: REST surface for acceptDispute.
      operations:
      - method: POST
        name: postacceptdispute
        description: Adyen Accept a Dispute
        call: disputes-acceptdispute.postacceptdispute
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: disputes-acceptdispute-mcp
    port: 9090
    transport: http
    description: MCP adapter for Adyen Disputes API — acceptDispute. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: adyen-accept-dispute
      description: Adyen Accept a Dispute
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: disputes-acceptdispute.postacceptdispute
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
