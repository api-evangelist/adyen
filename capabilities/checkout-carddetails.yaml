naftiko: 1.0.0-alpha2
info:
  label: Adyen Checkout API — cardDetails
  description: 'Adyen Checkout API — cardDetails. 1 operations. Lead operation: Adyen Get the List of Brands on the Card.
    Self-contained Naftiko capability covering one Adyen business surface.'
  tags:
  - Adyen
  - cardDetails
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    ADYEN_API_KEY: ADYEN_API_KEY
capability:
  consumes:
  - type: http
    namespace: checkout-carddetails
    baseUri: https://checkout-test.adyen.com/v71
    description: Adyen Checkout API — cardDetails business capability. Self-contained, no shared references.
    resources:
    - name: cardDetails
      path: /cardDetails
      operations:
      - name: postcarddetails
        method: POST
        description: Adyen Get the List of Brands on the Card
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
    authentication:
      type: apikey
      key: X-API-Key
      value: '{{env.ADYEN_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: checkout-carddetails-rest
    port: 8080
    description: REST adapter for Adyen Checkout API — cardDetails. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/carddetails
      name: carddetails
      description: REST surface for cardDetails.
      operations:
      - method: POST
        name: postcarddetails
        description: Adyen Get the List of Brands on the Card
        call: checkout-carddetails.postcarddetails
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: checkout-carddetails-mcp
    port: 9090
    transport: http
    description: MCP adapter for Adyen Checkout API — cardDetails. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: adyen-get-list-brands-card
      description: Adyen Get the List of Brands on the Card
      hints:
        readOnly: true
        destructive: false
        idempotent: false
      call: checkout-carddetails.postcarddetails
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
