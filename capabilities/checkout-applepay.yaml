naftiko: 1.0.0-alpha2
info:
  label: Adyen Checkout API — applePay
  description: 'Adyen Checkout API — applePay. 1 operations. Lead operation: Adyen Get an Apple Pay Session. Self-contained
    Naftiko capability covering one Adyen business surface.'
  tags:
  - Adyen
  - applePay
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    ADYEN_API_KEY: ADYEN_API_KEY
capability:
  consumes:
  - type: http
    namespace: checkout-applepay
    baseUri: https://checkout-test.adyen.com/v71
    description: Adyen Checkout API — applePay business capability. Self-contained, no shared references.
    resources:
    - name: applePay-sessions
      path: /applePay/sessions
      operations:
      - name: postapplepaysessions
        method: POST
        description: Adyen Get an Apple Pay Session
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
    authentication:
      type: apikey
      key: X-API-Key
      value: '{{env.ADYEN_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: checkout-applepay-rest
    port: 8080
    description: REST adapter for Adyen Checkout API — applePay. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/applepay/sessions
      name: applepay-sessions
      description: REST surface for applePay-sessions.
      operations:
      - method: POST
        name: postapplepaysessions
        description: Adyen Get an Apple Pay Session
        call: checkout-applepay.postapplepaysessions
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: checkout-applepay-mcp
    port: 9090
    transport: http
    description: MCP adapter for Adyen Checkout API — applePay. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: adyen-get-apple-pay-session
      description: Adyen Get an Apple Pay Session
      hints:
        readOnly: true
        destructive: false
        idempotent: false
      call: checkout-applepay.postapplepaysessions
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
