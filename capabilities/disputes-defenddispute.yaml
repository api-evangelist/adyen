naftiko: 1.0.0-alpha2
info:
  label: Adyen Disputes API — defendDispute
  description: 'Adyen Disputes API — defendDispute. 1 operations. Lead operation: Adyen Defend a Dispute. Self-contained Naftiko
    capability covering one Adyen business surface.'
  tags:
  - Adyen
  - defendDispute
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    ADYEN_API_KEY: ADYEN_API_KEY
capability:
  consumes:
  - type: http
    namespace: disputes-defenddispute
    baseUri: https://ca-test.adyen.com/ca/services/DisputeService/v30
    description: Adyen Disputes API — defendDispute business capability. Self-contained, no shared references.
    resources:
    - name: defendDispute
      path: /defendDispute
      operations:
      - name: postdefenddispute
        method: POST
        description: Adyen Defend a Dispute
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
    authentication:
      type: apikey
      key: X-API-Key
      value: '{{env.ADYEN_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: disputes-defenddispute-rest
    port: 8080
    description: REST adapter for Adyen Disputes API — defendDispute. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/defenddispute
      name: defenddispute
      description: REST surface for defendDispute.
      operations:
      - method: POST
        name: postdefenddispute
        description: Adyen Defend a Dispute
        call: disputes-defenddispute.postdefenddispute
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: disputes-defenddispute-mcp
    port: 9090
    transport: http
    description: MCP adapter for Adyen Disputes API — defendDispute. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: adyen-defend-dispute
      description: Adyen Defend a Dispute
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: disputes-defenddispute.postdefenddispute
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
