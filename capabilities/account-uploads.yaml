naftiko: 1.0.0-alpha2
info:
  label: Adyen Account API — Uploads
  description: 'Adyen Account API — Uploads. 1 operations. Lead operation: Adyen Upload a Document. Self-contained Naftiko
    capability covering one Adyen business surface.'
  tags:
  - Adyen
  - Uploads
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    ADYEN_API_KEY: ADYEN_API_KEY
capability:
  consumes:
  - type: http
    namespace: account-uploads
    baseUri: https://cal-test.adyen.com/cal/services/Account/v6
    description: Adyen Account API — Uploads business capability. Self-contained, no shared references.
    resources:
    - name: uploadDocument
      path: /uploadDocument
      operations:
      - name: postuploaddocument
        method: POST
        description: Adyen Upload a Document
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
    authentication:
      type: apikey
      key: X-API-Key
      value: '{{env.ADYEN_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: account-uploads-rest
    port: 8080
    description: REST adapter for Adyen Account API — Uploads. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/uploaddocument
      name: uploaddocument
      description: REST surface for uploadDocument.
      operations:
      - method: POST
        name: postuploaddocument
        description: Adyen Upload a Document
        call: account-uploads.postuploaddocument
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: account-uploads-mcp
    port: 9090
    transport: http
    description: MCP adapter for Adyen Account API — Uploads. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: adyen-upload-document
      description: Adyen Upload a Document
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: account-uploads.postuploaddocument
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
