naftiko: 1.0.0-alpha2
info:
  label: Adyen Payment API — Authorise3d
  description: 'Adyen Payment API — Authorise3d. 1 operations. Lead operation: Adyen Complete a 3DS Authorisation. Self-contained
    Naftiko capability covering one Adyen business surface.'
  tags:
  - Adyen
  - Authorise3d
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    ADYEN_API_KEY: ADYEN_API_KEY
capability:
  consumes:
  - type: http
    namespace: payments-authorise3d
    baseUri: https://pal-test.adyen.com/pal/servlet/Payment/v68
    description: Adyen Payment API — Authorise3d business capability. Self-contained, no shared references.
    resources:
    - name: authorise3d
      path: /authorise3d
      operations:
      - name: postauthorise3d
        method: POST
        description: Adyen Complete a 3DS Authorisation
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
    authentication:
      type: apikey
      key: X-API-Key
      value: '{{env.ADYEN_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: payments-authorise3d-rest
    port: 8080
    description: REST adapter for Adyen Payment API — Authorise3d. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/authorise3d
      name: authorise3d
      description: REST surface for authorise3d.
      operations:
      - method: POST
        name: postauthorise3d
        description: Adyen Complete a 3DS Authorisation
        call: payments-authorise3d.postauthorise3d
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: payments-authorise3d-mcp
    port: 9090
    transport: http
    description: MCP adapter for Adyen Payment API — Authorise3d. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: adyen-complete-3ds-authorisation
      description: Adyen Complete a 3DS Authorisation
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: payments-authorise3d.postauthorise3d
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
