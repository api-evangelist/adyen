naftiko: 1.0.0-alpha2
info:
  label: Adyen Payment API — Authorise
  description: 'Adyen Payment API — Authorise. 1 operations. Lead operation: Adyen Create an Authorisation. Self-contained
    Naftiko capability covering one Adyen business surface.'
  tags:
  - Adyen
  - Authorise
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    ADYEN_API_KEY: ADYEN_API_KEY
capability:
  consumes:
  - type: http
    namespace: payments-authorise
    baseUri: https://pal-test.adyen.com/pal/servlet/Payment/v68
    description: Adyen Payment API — Authorise business capability. Self-contained, no shared references.
    resources:
    - name: authorise
      path: /authorise
      operations:
      - name: postauthorise
        method: POST
        description: Adyen Create an Authorisation
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
    authentication:
      type: apikey
      key: X-API-Key
      value: '{{env.ADYEN_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: payments-authorise-rest
    port: 8080
    description: REST adapter for Adyen Payment API — Authorise. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/authorise
      name: authorise
      description: REST surface for authorise.
      operations:
      - method: POST
        name: postauthorise
        description: Adyen Create an Authorisation
        call: payments-authorise.postauthorise
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: payments-authorise-mcp
    port: 9090
    transport: http
    description: MCP adapter for Adyen Payment API — Authorise. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: adyen-create-authorisation
      description: Adyen Create an Authorisation
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: payments-authorise.postauthorise
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
