naftiko: 1.0.0-alpha2
info:
  label: Adyen Configuration API — Items
  description: 'Adyen Configuration API — Items. 1 operations. Lead operation: Adyen Get Card Order Items. Self-contained
    Naftiko capability covering one Adyen business surface.'
  tags:
  - Adyen
  - Items
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    ADYEN_API_KEY: ADYEN_API_KEY
capability:
  consumes:
  - type: http
    namespace: configuration-items
    baseUri: https://balanceplatform-api-test.adyen.com/bcl/v2
    description: Adyen Configuration API — Items business capability. Self-contained, no shared references.
    resources:
    - name: cardorders-id-items
      path: /cardorders/{id}/items
      operations:
      - name: getcardordersiditems
        method: GET
        description: Adyen Get Card Order Items
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id
          in: path
          type: string
          description: The unique identifier of the card order.
          required: true
        - name: offset
          in: query
          type: integer
          description: Specifies the position of an element in a list of card orders. The response includes a list of card
            order items that starts at the specified offset.
        - name: limit
          in: query
          type: integer
          description: The number of card order items returned per page. **Default:** 10.
    authentication:
      type: apikey
      key: X-API-Key
      value: '{{env.ADYEN_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: configuration-items-rest
    port: 8080
    description: REST adapter for Adyen Configuration API — Items. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/cardorders/{id}/items
      name: cardorders-id-items
      description: REST surface for cardorders-id-items.
      operations:
      - method: GET
        name: getcardordersiditems
        description: Adyen Get Card Order Items
        call: configuration-items.getcardordersiditems
        with:
          id: rest.id
          offset: rest.offset
          limit: rest.limit
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: configuration-items-mcp
    port: 9090
    transport: http
    description: MCP adapter for Adyen Configuration API — Items. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: adyen-get-card-order-items
      description: Adyen Get Card Order Items
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: configuration-items.getcardordersiditems
      with:
        id: tools.id
        offset: tools.offset
        limit: tools.limit
      outputParameters:
      - type: object
        mapping: $.
