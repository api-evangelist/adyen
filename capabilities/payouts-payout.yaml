naftiko: 1.0.0-alpha2
info:
  label: Adyen Payout API — Payout
  description: 'Adyen Payout API — Payout. 1 operations. Lead operation: Adyen Make an Instant Card Payout. Self-contained
    Naftiko capability covering one Adyen business surface.'
  tags:
  - Adyen
  - Payout
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    ADYEN_API_KEY: ADYEN_API_KEY
capability:
  consumes:
  - type: http
    namespace: payouts-payout
    baseUri: https://pal-test.adyen.com/pal/servlet/Payout/v68
    description: Adyen Payout API — Payout business capability. Self-contained, no shared references.
    resources:
    - name: payout
      path: /payout
      operations:
      - name: postpayout
        method: POST
        description: Adyen Make an Instant Card Payout
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
    authentication:
      type: apikey
      key: X-API-Key
      value: '{{env.ADYEN_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: payouts-payout-rest
    port: 8080
    description: REST adapter for Adyen Payout API — Payout. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/payout
      name: payout
      description: REST surface for payout.
      operations:
      - method: POST
        name: postpayout
        description: Adyen Make an Instant Card Payout
        call: payouts-payout.postpayout
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: payouts-payout-mcp
    port: 9090
    transport: http
    description: MCP adapter for Adyen Payout API — Payout. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: adyen-make-instant-card-payout
      description: Adyen Make an Instant Card Payout
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: payouts-payout.postpayout
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
