info:
  version: '30'
  x-publicVersion: true
  title: Adyen Disputes API
  description: >-
    You can use the [Disputes
    API](https://docs.adyen.com/risk-management/disputes-api) to automate the
    dispute handling process so that you can respond to disputes and chargebacks
    as soon as they are initiated. The Disputes API lets you retrieve defense
    reasons, supply and delete defense documents, and accept or defend disputes.
  termsOfService: https://www.adyen.com/legal/terms-and-conditions
  contact:
    name: Adyen Developer Experience team
    url: https://github.com/Adyen/adyen-openapi
tags:
- name: acceptDispute
- name: defendDispute
- name: deleteDisputeDefenseDocument
- name: retrieveApplicableDefenseReasons
- name: supplyDefenseDocument
