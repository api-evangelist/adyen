capability:
  workflows:
  - name: "Adyen Balance Platform"
    file: capabilities/balance-platform.yaml
    description: "Unified capability for building financial products on Adyen's balance platform. Combines the Configuration API for account holder and card management with the Transfers API for fund movement.
      Used by marketplace and platform builders to onboard users, issue cards, and manage fund transfers. Primary persona: Platform Engineer or Marketplace Developer."
    apis:
    - configuration
    toolCount: 5
  - name: "Adyen Merchant Account Management"
    file: capabilities/merchant-account-management.yaml
    description: "Unified capability for managing Adyen merchant accounts, stores, payment terminals, and dispute resolution. Combines Management API and Disputes API to give operations teams and platform
      administrators complete control over merchant configuration and chargeback handling. Primary persona: Merchant Operations Team or Platform Administrator."
    apis:
    - management
    - disputes
    toolCount: 8
  - name: "Adyen Online Payment Processing"
    file: capabilities/online-payment-processing.yaml
    description: "Unified capability for accepting and managing online payments. Combines the Checkout API and Payments API to provide merchants and developers with a complete payment acceptance workflow
      including session creation, payment authorisation, refunds, and cancellations. Primary persona: Developer or Merchant Platform Engineer."
    apis:
    - checkout
    - payments
    toolCount: 7
  personas:
  - id: developer
    name: Developer
    description: Builds payment integrations using Adyen APIs and SDKs.
  - id: merchant-operations
    name: Merchant Operations
    description: Manages merchant accounts, terminals, and dispute responses.
  - id: platform-engineer
    name: Platform Engineer
    description: Builds marketplace and fintech platforms using Adyen balance platform.
  domains:
  - name: Payments
    description: Online and in-person payment acceptance.
  - name: Account Management
    description: Merchant account and balance platform configuration.
  - name: Dispute Management
    description: Chargeback and dispute handling.
  - name: Marketplace
    description: Marketplace and platform fund management.
